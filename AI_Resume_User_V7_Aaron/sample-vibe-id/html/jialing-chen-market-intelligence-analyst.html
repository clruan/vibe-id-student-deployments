    for (var i = 0; i < specs.length - 1; i++) {
      for (var j = 0; j < 24; j++) {
        var a = getLayerNodePosition(specs[i], Math.floor(j / 24 * specs[i].count));
        var b = getLayerNodePosition(specs[i + 1], Math.floor(((j * 7) % 24) / 24 * specs[i + 1].count));
        positions.push(specs[i].x, a.y, a.z, specs[i + 1].x, b.y, b.z);
      }
    }
    var geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    var material = new THREE.LineBasicMaterial({
      color: 0x94a3b8,
      transparent: true,
      opacity: 0.16
    });
    root.add(new THREE.LineSegments(geometry, material));
  }

  function activationColor(THREE, value, hex) {
    var low = new THREE.Color(0xdbe4ef);
    var high = new THREE.Color(hex);
    return low.lerp(high, Math.pow(clamp(value, 0, 1), 0.7));
  }

  function hexToRgba(hex, alpha) {
    var clean = hex.replace("#", "");
    var value = parseInt(clean, 16);
    var r = (value >> 16) & 255;
    var g = (value >> 8) & 255;
    var b = value & 255;
    return "rgba(" + r + ", " + g + ", " + b + ", " + clamp(alpha, 0, 1).toFixed(3) + ")";
  }

  /* ───────── Legacy fallback (kept tiny) ───────── */

  function renderLegacyRanking(project, state) {
    var w = project.widget;
    var modeId = state.rankingModeByProject[project.id] || (w.modes && w.modes[0] && w.modes[0].id);
    var mode = (w.modes || []).find(function (m) { return m.id === modeId; }) || (w.modes && w.modes[0]);
    if (!mode) return "";
    return '<div class="widget-head"><div><h4>' + w.title + '</h4><p>' + w.help + '</p></div></div>' +
      '<p class="widget-note">' + mode.note + '</p>' +
      '<div class="ranking-list">' +
        mode.ranking.map(function (r) {
          return '<div class="ranking-row">' +
            '<span class="ranking-name">' + r.label + '</span>' +
            '<div class="ranking-bar-track"><div class="ranking-bar-fill" style="width:' + r.value + '%"></div></div>' +
            '<span class="ranking-score">' + r.value + '</span>' +
          '</div>';
        }).join("") +
      '</div>';
  }

  function renderLegacyGraph(project, state) {
    var w = project.widget;
    var viewId = state.graphViewByProject[project.id] || (w.views && w.views[0] && w.views[0].id);
    var view = (w.views || []).find(function (v) { return v.id === viewId; }) || (w.views && w.views[0]);
    if (!view) return "";
    return '<div class="widget-head"><div><h4>' + w.title + '</h4><p>' + w.help + '</p></div></div>' +
      renderEvidenceSvg(w.nodes, w.edges, view) +
      '<p class="widget-note">' + view.note + '</p>';
  }

  function renderLegacyRoi(project, state, stageIndex) {
    /* Older V5 roi-structure — we do not re-render it here; the new
     * threshold-dials widget covers the imaging project now.
     */
    return '<p class="widget-note">Legacy widget type; upgrade project.widget to threshold-dials.</p>';
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  ns.widgets = { renderWidget: renderWidget, bindNeuralWorkbench: bindNeuralWorkbench };
})();

</script>
<script>
(function () {
  const ns = window.aiResume || (window.aiResume = {});

  var currentData = null;
  var currentState = null;
  var filterChangeCallback = null;
  var DEFAULT_VISIBLE_SKILLS = 10;

  function getIntroSkillRoot() {
    return document.getElementById("intro-skills");
  }

  function getContainer(group, slot) {
    return document.querySelector('[data-skill-group="' + group + '"][data-skill-slot="' + slot + '"]');
  }

  function getSkillLayout(data) {
    var layout = data.skillLayout || {};
    var primary = layout.primary || { group: "quant", title: "Quantitative Toolkit" };
    var secondary = Array.isArray(layout.secondary) && layout.secondary.length
      ? layout.secondary
      : [{ group: "stack", title: "Technical Stack" }];

    return {
      primary: primary,
      secondary: secondary,
      hideExperienceContext: Boolean(layout.hideExperienceContext)
    };
  }

  function getLayoutPanels(data) {
    var layout = getSkillLayout(data);
    return [Object.assign({ tier: "primary" }, layout.primary)]
      .concat(layout.secondary.map(function (panel) {
        return Object.assign({ tier: "secondary" }, panel);
      }));
  }

  function isTechPanel(group) {
    return group === "stack" || group === "certifications";
  }

  function normalizeToken(value) {
    return String(value || "")
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function getMeaningfulTokens(value) {
    var stop = {
      a: true, an: true, and: true, are: true, as: true, at: true, by: true,
      for: true, from: true, in: true, into: true, of: true, on: true, or: true,
      the: true, to: true, with: true, using: true, profile: true, role: true,
      analyst: true, assistant: true, engineer: true, scientist: true
    };

    return normalizeToken(value).split("-").filter(function (token) {
      return token && token.length > 1 && !stop[token];
    });
  }

  function getAtsProfile(data) {
    return (data && (data.atsProfile || data.atsSignals)) || {};
  }

  function getJobSources(data) {
    var ats = getAtsProfile(data);
    var profile = (data && data.profile) || {};
    var directory = (data && data.directory) || {};
    var sources = [];

    [
      ats.targetRole,
      ats.jobTitle,
      ats.jdTitle,
      ats.jobDescription,
      ats.jdText,
      data && data.targetRole,
      profile.targetRole,
      directory.role,
      directory.summary
    ].forEach(function (value) {
      if (value) sources.push({ value: value, isKeyword: false });
    });

    if (Array.isArray(ats.targetKeywords)) {
      ats.targetKeywords.forEach(function (value) {
        if (value) sources.push({ value: value, isKeyword: true });
      });
    }

    if (Array.isArray(ats.keywordGroups)) {
      ats.keywordGroups.forEach(function (group) {
        (group.keywords || []).forEach(function (value) {
          if (value) sources.push({ value: value, isKeyword: true });
        });
      });
    }

    return sources;
  }

  function getJobTermModels(data) {
    var seen = {};
    return getJobSources(data).map(function (source) {
      var label = String(source.value || "").replace(/<[^>]*>/g, "").trim();
      var normalized = normalizeToken(label);
      if (!label || !normalized || seen[normalized]) return null;
      seen[normalized] = true;
      return {
        label: label,
        normalized: normalized,
        tokens: getMeaningfulTokens(label),
        isKeyword: source.isKeyword
      };
    }).filter(Boolean);
  }

  function scoreTextForJob(data, value) {
    var terms = getJobTermModels(data);
    if (!terms.length) return 0;

    var normalized = normalizeToken(value);
    var tokens = getMeaningfulTokens(value);
    var rawTokens = normalizeToken(value).split("-").filter(Boolean);
    if (!normalized || !rawTokens.length) return 0;

    var tokenSet = {};
    tokens.forEach(function (token) { tokenSet[token] = true; });
    var rawTokenSet = {};
    rawTokens.forEach(function (token) { rawTokenSet[token] = true; });

    return terms.reduce(function (score, term) {
      var weight = term.isKeyword ? 1 : 0.35;
      if (normalized === term.normalized) return score + 1000 * weight;

      if (term.normalized.length <= 2) {
        if (rawTokenSet[term.normalized]) score += 720 * weight;
        return score;
      }

      if (normalized.indexOf(term.normalized) !== -1 || term.normalized.indexOf(normalized) !== -1) {
        score += 720 * weight;
      }

      var overlap = term.tokens.filter(function (token) { return tokenSet[token]; }).length;
      if (overlap) {
        var coverage = overlap / Math.max(term.tokens.length, 1);
        score += (overlap * 90 + coverage * 180) * weight;
      }
      return score;
    }, 0);
  }

  function rankSkillEntriesForJob(data, entries) {
    if (!getJobTermModels(data).length) return entries;

    return entries.map(function (entry, index) {
      var text = [
        entry.label,
        entry.item && entry.item.id,
        entry.item && entry.item.label
      ].filter(Boolean).join(" ");
      return {
        entry: entry,
        index: index,
        score: scoreTextForJob(data, text)
      };
    }).sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return a.index - b.index;
    }).map(function (item) {
      return item.entry;
    });
  }

  function getJobKeywordMatches(data, value) {
    var normalized = normalizeToken(value);
    if (!normalized) return [];
    var rawTokenSet = {};
    normalized.split("-").filter(Boolean).forEach(function (token) {
      rawTokenSet[token] = true;
    });

    return getJobTermModels(data)
      .filter(function (term) {
        if (!term.isKeyword) return false;
        if (term.normalized.length <= 2) return rawTokenSet[term.normalized] || normalized === term.normalized;
        return normalized.indexOf(term.normalized) !== -1;
      })
      .sort(function (a, b) {
        return b.normalized.length - a.normalized.length;
      })
      .map(function (term) { return term.label; });
  }

  function itemKey(group, item) {
    return group + ":" + normalizeToken(item.id || item.label);
  }

  function ensureSkillPanels(data, slot) {
    var root = document.querySelector("#intro-skills .intro-skills-grid");
    if (!root || slot !== "intro") return;

    var signature = getLayoutPanels(data).map(function (panel) {
      return panel.tier + ":" + panel.group + ":" + panel.title;
    }).join("|");

    if (root.dataset.skillLayoutSignature === signature) return;

    root.innerHTML = getLayoutPanels(data).map(function (panel) {
      var className = "skill-panel skill-panel-" + panel.tier;
      var itemClass = "skill-token-list";
      return '<div class="' + className + '" data-skill-panel-group="' + panel.group + '">' +
        '<div class="skill-panel-title-row">' +
          '<h3>' + panel.title + '</h3>' +
          '<span class="skill-panel-count" data-skill-count="' + panel.group + '"></span>' +
        '</div>' +
        '<div class="' + itemClass + '" data-skill-group="' + panel.group + '" data-skill-slot="' + slot + '"></div>' +
        '<button class="skill-panel-expand" type="button" data-skill-expand="' + panel.group + '" hidden></button>' +
      '</div>';
    }).join("");

    root.dataset.skillLayoutSignature = signature;
  }

  function getGroupItems(data, group, includeProjectOnly) {
    if (group === "quant") return data.quantToolkit || [];
    if (group === "stack") {
      return (data.stack || []).filter(function (tech) {
        return includeProjectOnly || !tech.projectOnly;
      });
    }
    if (group === "certifications") return data.licensesCertifications || [];
    if (group === "analytical") return data.analyticalSkills || [];
    return [];
  }

  function getAllSkillItems(data) {
    var seen = {};
    var groups = ["quant", "analytical", "stack", "certifications"];
    var items = [];

    groups.forEach(function (group) {
      getGroupItems(data, group, true).forEach(function (item) {
        var key = itemKey(group, item);
        if (seen[key]) return;
        seen[key] = true;
        items.push({ key: key, group: group, item: item, label: item.label || item.id || key });
      });
    });

    return items;
  }

  function getIntroSkillItems(data, group) {
    var all = getAllSkillItems(data).filter(function (entry) { return entry.group === group; });
    var related = all.filter(function (entry) {
      return hasProjectRelation(data, entry) || hasExperienceRelation(data, entry);
    });
    return rankSkillEntriesForJob(data, related);
  }

  function hasProjectRelation(data, entry) {
    if (Array.isArray(entry.item.relatedProjects) && entry.item.relatedProjects.length) return true;
    if (entry.group !== "stack") return false;
    return (data.projects || []).some(function (project) {
      return Array.isArray(project.relatedTech) && project.relatedTech.indexOf(entry.item.id) !== -1;
    });
  }

  function hasExperienceRelation(data, entry) {
    if (Array.isArray(entry.item.relatedExp) && entry.item.relatedExp.length) return true;
    if (entry.group !== "stack") return false;
    return (data.experience || []).some(function (exp) {
      return Array.isArray(exp.relatedTech) && exp.relatedTech.indexOf(entry.item.id) !== -1;
    });
  }

  function getSelectedKeys(state) {
    return Array.isArray(state.selectedSkillIds) ? state.selectedSkillIds : [];
  }

  function isSelected(state, key) {
    return getSelectedKeys(state).indexOf(key) !== -1;
  }

  function toggleSelected(state, key) {
    var selected = getSelectedKeys(state).slice();
    var index = selected.indexOf(key);
    if (index === -1) selected.push(key);
    else selected.splice(index, 1);
    state.selectedSkillIds = selected;
  }

  function clearSelected(state) {
    state.selectedSkillIds = [];
  }

  function renderIntroPanels(data, state) {
    currentData = data;
    currentState = state;
    ensureSkillPanels(data, "intro");

    getLayoutPanels(data).forEach(function (panel) {
      var container = getContainer(panel.group, "intro");
      if (!container) return;

      var entries = getIntroSkillItems(data, panel.group);
      var limit = getVisibleSkillLimit(data, panel.group);
      var expanded = isSkillGroupExpanded(state, panel.group);
      var visibleEntries = expanded ? entries : entries.slice(0, limit);

      container.innerHTML = visibleEntries.map(function (entry) {
        return renderFilterButton(entry, isSelected(state, entry.key));
      }).join("");

      var panelNode = container.closest(".skill-panel");
      if (panelNode) {
        panelNode.classList.toggle("is-empty", entries.length === 0);
        var count = panelNode.querySelector("[data-skill-count]");
        var expand = panelNode.querySelector("[data-skill-expand]");
        if (count) count.textContent = entries.length ? visibleEntries.length + "/" + entries.length : "";
        if (expand) {
          expand.hidden = entries.length <= limit;
          expand.textContent = expanded ? "Show fewer" : "Show all " + entries.length;
          expand.setAttribute("aria-expanded", expanded ? "true" : "false");
        }
      }
    });

    renderFilterResults(data, state);
    bindIntroFilterEvents();
  }

  function renderFilterButton(entry, selected) {
    var item = entry.item;
    var color = item.color || "#4f46e5";

    return '<button class="skill-filter-chip ' + (selected ? "is-active" : "") + '" type="button" data-skill-filter="' + entry.key + '" aria-pressed="' + (selected ? "true" : "false") + '" style="--skill-color:' + color + '">' +
      renderSkillToken(entry, selected) +
    '</button>';
  }

  function renderFilterResults(data, state) {
    var root = document.getElementById("skill-filter-results");
    if (!root) return;

    var selected = getSelectedKeys(state);
    var projects = getFilteredProjects(data, state);
    var experiences = getFilteredExperience(data, state);
    document.querySelectorAll("[data-skill-clear]").forEach(function (clear) {
      clear.hidden = selected.length === 0;
    });
    syncGlobalClearButton(selected.length > 0);

    if (!selected.length) {
      root.innerHTML = '<div class="skill-filter-empty">' +
        '<strong>All projects and experiences are visible.</strong>' +
        '<span>Select skills above to narrow the portfolio, then jump directly to the matched cards.</span>' +
      '</div>';
      return;
    }

    root.innerHTML = '<div class="skill-filter-summary">' +
      '<div>' +
        '<strong>' + selected.length + ' skill' + (selected.length === 1 ? "" : "s") + ' selected</strong>' +
        '<span>' + projects.length + ' project' + (projects.length === 1 ? "" : "s") + ' and ' + experiences.length + ' experience' + (experiences.length === 1 ? "" : "s") + ' match at least one selected skill. The sections below are already filtered.</span>' +
      '</div>' +
      '<button class="skill-filter-clear skill-filter-clear-inline" type="button" data-skill-clear>Clear filters</button>' +
    '</div>';
  }

  function bindIntroFilterEvents() {
    var root = getIntroSkillRoot();
    if (!root) return;
    if (root.dataset.skillFilterEventsBound === "true") return;
    root.dataset.skillFilterEventsBound = "true";

    root.addEventListener("click", function (event) {
      var filterButton = event.target.closest("[data-skill-filter]");
      if (filterButton && root.contains(filterButton)) {
        toggleSelected(currentState, filterButton.dataset.skillFilter);
        renderIntroPanels(currentData, currentState);
        if (filterChangeCallback) filterChangeCallback();
        return;
      }

      var clearButton = event.target.closest("[data-skill-clear]");
      if (clearButton && root.contains(clearButton)) {
        event.preventDefault();
        event.stopPropagation();
        clearActiveFilters();
        return;
      }

      var expandButton = event.target.closest("[data-skill-expand]");
      if (expandButton && root.contains(expandButton)) {
        var group = expandButton.dataset.skillExpand;
        currentState.expandedSkillGroups = currentState.expandedSkillGroups || {};
        currentState.expandedSkillGroups[group] = !currentState.expandedSkillGroups[group];
        renderIntroPanels(currentData, currentState);
      }
    });

    if (document.documentElement.dataset.skillClearEventsBound !== "true") {
      document.documentElement.dataset.skillClearEventsBound = "true";
      document.addEventListener("click", function (event) {
        var clearButton = event.target.closest("[data-skill-clear]");
        if (!clearButton) return;
        var skillRoot = getIntroSkillRoot();
        if (skillRoot && skillRoot.contains(clearButton)) return;
        event.preventDefault();
        clearActiveFilters();
      });
    }
  }

  function clearActiveFilters() {
    var data = currentData || window.resumeContent;
    var state = currentState || window.aiResumeState;
    if (!data || !state) return;
    clearSelected(state);
    renderIntroPanels(data, state);
    if (filterChangeCallback) filterChangeCallback();
  }

  function syncGlobalClearButton(active) {
    var button = document.querySelector("[data-global-skill-clear]");
    if (!button) {
      button = document.createElement("button");
      button.type = "button";
      button.className = "filter-clear-floating";
      button.dataset.skillClear = "";
      button.dataset.globalSkillClear = "";
      button.textContent = "Clear filters";
      document.body.appendChild(button);
    }
    button.hidden = !active;
  }

  function getVisibleSkillLimit(data, group) {
    var limits = data.skillLayout && data.skillLayout.introLimits;
    if (limits && typeof limits[group] === "number") return Math.max(1, limits[group]);
    return DEFAULT_VISIBLE_SKILLS;
  }

  function isSkillGroupExpanded(state, group) {
    return Boolean(state.expandedSkillGroups && state.expandedSkillGroups[group]);
  }

  function getSelectedEntries(data, state) {
    var selected = getSelectedKeys(state);
    if (!selected.length) return [];
    var byKey = {};
    getAllSkillItems(data).forEach(function (entry) { byKey[entry.key] = entry; });
    return selected.map(function (key) { return byKey[key]; }).filter(Boolean);
  }

  function getProjectSkillItems(data, project) {
    var matches = getAllSkillItems(data).filter(function (entry) {
      return entryMatchesProject(entry, project);
    });
    return rankSkillEntriesForJob(data, matches);
  }

  function getExperienceSkillItems(data, exp, expId) {
    var matches = getAllSkillItems(data).filter(function (entry) {
      return entryMatchesExperience(data, entry, exp, expId);
    });
    return rankSkillEntriesForJob(data, matches);
  }

  function entryMatchesProject(entry, project) {
    if (!project) return false;
    if (Array.isArray(entry.item.relatedProjects) && entry.item.relatedProjects.indexOf(project.id) !== -1) return true;
    if (entry.group === "stack" && Array.isArray(project.relatedTech) && project.relatedTech.indexOf(entry.item.id) !== -1) return true;
    return false;
  }

  function entryMatchesExperience(data, entry, exp, expId) {
    if (!exp) return false;
    if (Array.isArray(entry.item.relatedExp) && entry.item.relatedExp.indexOf(expId) !== -1) return true;
    if (entry.group === "stack" && Array.isArray(exp.relatedTech) && exp.relatedTech.indexOf(entry.item.id) !== -1) return true;
    if (entry.group === "analytical" && Array.isArray(exp.contextualSkills)) {
      return exp.contextualSkills.some(function (label) {
        return normalizeToken(label) === normalizeToken(entry.label);
      });
    }
    return false;
  }

  function getFilteredProjects(data, state) {
    var selected = getSelectedEntries(data, state);
    if (!selected.length) return data.projects || [];
    return (data.projects || []).filter(function (project) {
      return selected.some(function (entry) {
        return entryMatchesProject(entry, project);
      });
    });
  }

  function getFilteredExperience(data, state) {
    var selected = getSelectedEntries(data, state);
    if (!selected.length) return data.experience || [];
    return (data.experience || []).filter(function (exp, index) {
      var expId = exp.id || "exp-" + index;
      return selected.some(function (entry) {
        return entryMatchesExperience(data, entry, exp, expId);
      });
    });
  }

  function renderSkillPills(items, options) {
    var limit = options && options.limit ? options.limit : 10;
    var selectedKeys = getActiveSelectedKeys(options);
    var uniqueItems = orderSkillItemsForFilter(uniqueByLabel(items || []), selectedKeys);
    var selectedVisibleCount = uniqueItems.filter(function (entry) {
      return selectedKeys.indexOf(entry.key) !== -1;
    }).length;
    var visibleLimit = selectedKeys.length ? Math.max(limit, selectedVisibleCount) : limit;
    var visible = uniqueItems.slice(0, visibleLimit);
    var hidden = uniqueItems.slice(visibleLimit);
    if (!visible.length) return "";

    var showOverflow = hidden.length && !(options && options.hideOverflow);

    return '<div class="project-skill-strip" aria-label="Related skills">' +
      visible.map(function (entry) {
        return renderSkillToken(entry, selectedKeys.indexOf(entry.key) !== -1, "project-skill-pill");
      }).join("") +
      (showOverflow ? hidden.map(function (entry) {
        return renderSkillToken(entry, selectedKeys.indexOf(entry.key) !== -1, "project-skill-pill project-skill-pill-extra");
      }).join("") : "") +
      (showOverflow ? '<button class="project-skill-pill project-skill-pill-more" type="button" data-skill-strip-expand data-skill-overflow-count="' + hidden.length + '" aria-expanded="false">+' + hidden.length + '</button>' : "") +
    '</div>';
  }

  function getActiveSelectedKeys(options) {
    if (options && Array.isArray(options.selectedKeys)) return options.selectedKeys;
    var state = (options && options.state) || currentState || window.aiResumeState || {};
    return getSelectedKeys(state);
  }

  function orderSkillItemsForFilter(items, selectedKeys) {
    if (!selectedKeys.length) return items;
    var selectedIndex = {};
    selectedKeys.forEach(function (key, index) {
      selectedIndex[key] = index;
    });

    return items.map(function (entry, index) {
      return { entry: entry, index: index };
    }).sort(function (a, b) {
      var aSelected = selectedIndex[a.entry.key];
      var bSelected = selectedIndex[b.entry.key];
      var aHas = typeof aSelected === "number";
      var bHas = typeof bSelected === "number";
      if (aHas && bHas) return aSelected - bSelected;
      if (aHas) return -1;
      if (bHas) return 1;
      return a.index - b.index;
    }).map(function (item) {
      return item.entry;
    });
  }

  document.addEventListener("click", function (event) {
    var button = event.target.closest("[data-skill-strip-expand]");
    if (!button) return;
    event.preventDefault();
    event.stopPropagation();

    var strip = button.closest(".project-skill-strip");
    if (!strip) return;

    var expanded = !strip.classList.contains("is-expanded");
    strip.classList.toggle("is-expanded", expanded);
    button.setAttribute("aria-expanded", expanded ? "true" : "false");
    button.textContent = expanded ? "Show fewer" : "+" + button.dataset.skillOverflowCount;
  }, true);

  function renderSkillToken(entry, selected, extraClass) {
    var color = entry.item.color || "#4f46e5";
    var className = "skill-token" + (extraClass ? " " + extraClass : "") + (selected ? " is-highlighted" : "");
    var icon = entry.group === "stack" && ns.icons && ns.icons.renderTechIcon
      ? '<span class="skill-token-icon">' + ns.icons.renderTechIcon(entry.item.id, entry.label) + '</span>'
      : "";
    return '<span class="' + className + '" style="--skill-color:' + color + '">' + icon + '<span>' + entry.label + '</span></span>';
  }

  function uniqueByLabel(items) {
    var seen = {};
    return items.filter(function (entry) {
      var key = normalizeToken(entry.label);
      if (seen[key]) return false;
      seen[key] = true;
      return true;
    });
  }

  function renderSkillPanels(data, state, options) {
    currentData = data;
    currentState = state;
    filterChangeCallback = options && options.onFilterChange ? options.onFilterChange : null;
    renderIntroPanels(data, state);
  }

  function updateHighlights(data, state) {
    currentData = data;
    currentState = state;
    renderFilterResults(data, state);
  }

  function syncToPage(page) {
    if (!currentState) return;
    currentState.currentPage = page;
    document.body.setAttribute("data-current-page", String(page));
  }

  window.addEventListener("pagechange", function (e) {
    syncToPage(e.detail.page);
  });

  ns.skills = {
    renderSkillPanels: renderSkillPanels,
    updateHighlights: updateHighlights,
    syncToPage: syncToPage,
    getFilteredProjects: getFilteredProjects,
    getFilteredExperience: getFilteredExperience,
    getProjectSkillItems: getProjectSkillItems,
    getExperienceSkillItems: getExperienceSkillItems,
    renderSkillPills: renderSkillPills,
    scoreTextForJob: scoreTextForJob,
    getJobKeywordMatches: getJobKeywordMatches
  };
})();

</script>
<script>
(function () {
  const ns = window.aiResume || (window.aiResume = {});

  function renderProjectsAccordion(data, state, callbacks) {
    var container = document.getElementById("projects-accordion");
    var projects = ns.skills && ns.skills.getFilteredProjects
      ? ns.skills.getFilteredProjects(data, state)
      : data.projects;

    if (!projects.length) {
      container.innerHTML = '<div class="filter-empty-state">' +
        '<h3>No projects match the selected skills.</h3>' +
        '<p>Clear one filter or choose a broader skill combination.</p>' +
      '</div>';
      return;
    }

    var projectLimit = 4;
    var visibleProjects = state.showAllProjects ? projects : projects.slice(0, projectLimit);

    container.innerHTML = visibleProjects
      .map(function (project, index) {
        var isLead = index === 0;
        return '<div class="project-accordion-item ' + (isLead ? "is-lead" : "") + '" data-project-id="' + project.id + '" style="--project-accent:' + project.accent + '">' +
          '<div class="project-accordion-header" role="button" tabindex="0">' +
            '<div>' +
              renderProjectSkillStrip(data, project) +
              (isLead ? '<span class="project-lead-flag">Featured project</span>' : "") +
              '<div class="project-accordion-title">' + project.navTitle + '</div>' +
              '<div class="project-accordion-meta">' + project.navMeta + '</div>' +
            '</div>' +
            '<div class="demo-badge-wrap">' +
              '<div class="demo-badge">' +
                '<span class="demo-badge-copy">' +
                  '<span class="demo-badge-title">Check Demo</span>' +
                  '<span class="demo-badge-meta">' + demoLabel(project) + '</span>' +
                '</span>' +
                '<span class="demo-badge-arrow">\u25BC</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          renderProjectEndorsement(project, "summary") +
          '<div class="project-accordion-body">' +
            '<div class="project-body-inner" data-project-id="' + project.id + '"></div>' +
          '</div>' +
        '</div>';
      })
      .join("") +
      renderProjectListToggle(projects.length, projectLimit, state.showAllProjects);

    container.querySelectorAll(".project-accordion-header").forEach(function (header) {
      function toggleProject() {
        var item = header.closest(".project-accordion-item");
        var projectId = item.dataset.projectId;
        var isExpanded = item.classList.contains("is-expanded");

        container.querySelectorAll(".project-accordion-item").forEach(function (el) {
          el.classList.remove("is-expanded");
        });

        if (!isExpanded) {
          item.classList.add("is-expanded");
          state.activeProjectId = projectId;
          renderProjectDetail(data, state, projectId, callbacks);
          settleProjectScroll(item);
          if (callbacks.onProjectActivate) callbacks.onProjectActivate(projectId);
        } else {
          state.activeProjectId = null;
          if (callbacks.onProjectDeactivate) callbacks.onProjectDeactivate();
        }

        container.querySelectorAll(".project-accordion-header").forEach(function (btn) {
          btn.setAttribute("aria-expanded", btn.closest(".project-accordion-item").classList.contains("is-expanded") ? "true" : "false");
        });
      }

      header.addEventListener("click", function () {
        toggleProject();
      });

      header.addEventListener("keydown", function (event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        toggleProject();
      });

      header.addEventListener("mouseenter", function () {
        var projectId = header.closest(".project-accordion-item").dataset.projectId;
        state.hoverProjectId = projectId;
        if (callbacks.onProjectHover) callbacks.onProjectHover(projectId);
      });

      header.addEventListener("mouseleave", function () {
        state.hoverProjectId = null;
        if (callbacks.onProjectLeave) callbacks.onProjectLeave();
      });

      header.setAttribute("aria-expanded", "false");
    });

    var toggle = container.querySelector("[data-project-list-toggle]");
    if (toggle) {
      toggle.addEventListener("click", function () {
        state.showAllProjects = !state.showAllProjects;
        renderProjectsAccordion(data, state, callbacks);
      });
    }
  }

  function settleProjectScroll(item) {
    if (!item) return;
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(function () {
        item.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }

  function renderProjectListToggle(total, limit, expanded) {
    if (total <= limit) return "";
    return '<button class="project-list-toggle" type="button" data-project-list-toggle aria-expanded="' + (expanded ? "true" : "false") + '">' +
      (expanded ? "Show fewer projects" : "Show more projects") +
    '</button>';
  }

  function renderProjectSkillStrip(data, project) {
    if (!ns.skills || !ns.skills.getProjectSkillItems || !ns.skills.renderSkillPills) return "";
    return ns.skills.renderSkillPills(ns.skills.getProjectSkillItems(data, project), { limit: 9 });
  }

  function demoLabel(project) {
    var type = project.widget && project.widget.type;
    if (!type) return "Workflow walkthrough";
    switch (type) {
      case "policy-lab": return "Two-stage policy simulator";
      case "cluster-topology-lab": return "Phenotype map explorer";
      case "market-pulse-lab": return "Market signal console";
      case "research-agent-lab": return "Hypothesis evidence lab";
      case "nd2-agent-lab": return "ND2 threshold agent";
      case "survival-causal-lab": return "Survival causal lab";
      case "causal-companion-lab": return "Causal learning graph";
      case "timeline-pattern-lab": return "Animated timeline lab";
      case "nlp-extraction-lab": return "Medical NLP inspector";
      case "tradeoff-frontier": return "Precision / recall frontier";
      case "evidence-path": return "Evidence-path trace";
      case "threshold-dials": return "Threshold dials + report";
      case "estimator-forest": return "Forest plot of estimators";
      case "neural-workbench": return "Interactive 3D CNN";
      default: return "Live algo walkthrough";
    }
  }

  function renderProjectEndorsement(project, placement) {
    if (!project.endorsement || !ns.modes || !ns.modes.renderVipEndorsement) return "";
    var eyebrow = "Expert Endorsement";
    if (placement === "after") eyebrow = "Expert Endorsement";
    if (placement === "before") eyebrow = "Expert Endorsement";

    return ns.modes.renderVipEndorsement(project.endorsement, {
      eyebrow: eyebrow,
      variant: "project project-" + placement,
      force: true
    });
  }

  function isAaronProfile(data) {
    return data && data.id === "aaron-li";
  }

  function renderProjectDetail(data, state, projectId, callbacks) {
    var project = ns.state.getProjectById(data, projectId);
    var stages = Array.isArray(project.stages) && project.stages.length ? project.stages : [];
    var stageIndex = Math.min(state.activeStageByProject[project.id] || 0, Math.max(stages.length - 1, 0));
    var stage = stages[stageIndex];
    var projectSummary = project.summary || project.tagline || project.algorithmSummary || "";
    var artifactLinks = renderArtifactLinks(project);
    var evidenceBlock = renderEvidenceDeliverable(project, artifactLinks);
    var interactiveBlock = renderInteractiveDemo(project, state, stageIndex);
    var methodologyBlock = '<div class="algorithm-view">' +
      renderMethodologyNotes(project) +
      renderCheckDemoContent(data, project, state, stageIndex, stage) +
    '</div>';

    var inner = document.querySelector('.project-body-inner[data-project-id="' + projectId + '"]');

    inner.innerHTML =
      '<article class="project-view" style="--project-accent:' + project.accent + '">' +
        (projectSummary ? '<p class="project-detail-summary project-detail-summary-' + project.id + '">' + projectSummary + '</p>' : "") +
        renderProjectSection("Evidence / Deliverable", evidenceBlock) +
        renderProjectSection("Interactive Demo / Screenshots", interactiveBlock) +
        renderProjectSection("Methodology", methodologyBlock) +
      '</article>';

    inner.querySelectorAll(".stage-button").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.activeStageByProject[projectId] = Number(btn.dataset.stageIndex);
        renderProjectDetail(data, state, projectId, callbacks);
      });
    });

    inner.querySelectorAll("[data-screenshot-index]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        openScreenshotDialog(project, Number(btn.dataset.screenshotIndex));
      });
    });

    var type = project.widget && project.widget.type;

    if (type === "policy-lab") {
      inner.querySelectorAll("[data-policy-scenario]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.policyScenarioByProject[projectId] = btn.dataset.policyScenario;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
      inner.querySelectorAll("[data-policy-patient]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.policyPatientByProject[projectId] = btn.dataset.policyPatient;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "cluster-topology-lab") {
      inner.querySelectorAll("[data-cluster-lens]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.clusterLensByProject[projectId] = btn.dataset.clusterLens;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
      inner.querySelectorAll("[data-cluster-focus]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.clusterFocusByProject[projectId] = btn.dataset.clusterFocus;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "tradeoff-frontier") {
      inner.querySelectorAll("[data-tradeoff-run]").forEach(function (el) {
        el.addEventListener("click", function () {
          state.tradeoffRunByProject[projectId] = el.dataset.tradeoffRun;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "market-pulse-lab") {
      inner.querySelectorAll("[data-market-scenario]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.marketScenarioByProject[projectId] = btn.dataset.marketScenario;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
      inner.querySelectorAll("[data-market-ticker]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.marketTickerByProject[projectId] = btn.dataset.marketTicker;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "research-agent-lab") {
      inner.querySelectorAll("[data-research-hypothesis]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.researchHypothesisByProject[projectId] = btn.dataset.researchHypothesis;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "nd2-agent-lab") {
      var nd2Slider = inner.querySelector("[data-nd2-threshold]");
      if (nd2Slider) {
        nd2Slider.addEventListener("input", function () {
          state.nd2ThresholdByProject[projectId] = Number(nd2Slider.value);
          renderProjectDetail(data, state, projectId, callbacks);
        });
      }
      inner.querySelectorAll("[data-nd2-channel]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.nd2ChannelByProject[projectId] = btn.dataset.nd2Channel;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "survival-causal-lab") {
      inner.querySelectorAll("[data-survival-cohort]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.survivalCohortByProject[projectId] = btn.dataset.survivalCohort;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "causal-companion-lab") {
      inner.querySelectorAll("[data-causal-concept]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.causalConceptByProject[projectId] = btn.dataset.causalConcept;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "timeline-pattern-lab") {
      inner.querySelectorAll("[data-timeline-pattern]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.timelinePatternByProject[projectId] = btn.dataset.timelinePattern;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "nlp-extraction-lab") {
      inner.querySelectorAll("[data-nlp-sample]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.nlpSampleByProject[projectId] = btn.dataset.nlpSample;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "evidence-path") {
      inner.querySelectorAll("[data-evidence-view]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.evidenceViewByProject[projectId] = btn.dataset.evidenceView;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "threshold-dials") {
      var slider = inner.querySelector(".threshold-input");
      if (slider) {
        slider.addEventListener("input", function () {
          state.thresholdByProject[projectId] = Number(slider.value);
          renderProjectDetail(data, state, projectId, callbacks);
        });
      }
      inner.querySelectorAll("[data-threshold-value]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.thresholdByProject[projectId] = Number(btn.dataset.thresholdValue);
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "estimator-forest") {
      inner.querySelectorAll("[data-estimator-row]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          state.estimatorRowByProject[projectId] = btn.dataset.estimatorRow;
          renderProjectDetail(data, state, projectId, callbacks);
        });
      });
    }

    if (type === "neural-workbench" && ns.widgets && ns.widgets.bindNeuralWorkbench) {
      ns.widgets.bindNeuralWorkbench(project, state, inner);
    }
  }

  function renderWidgetPanel(project, state, stageIndex) {
    if (!project.widget) return "";
    return '<div class="widget-panel widget-panel-' + (project.widget.type || "base") + '">' +
      ns.widgets.renderWidget(project, state, stageIndex) +
    '</div>';
  }

  function renderCheckDemoContent(data, project, state, stageIndex, stage) {
    var stages = Array.isArray(project.stages) ? project.stages : [];
    if (!stages.length) return "";
    return '<div class="algorithm-stage-row">' +
        stages.map(function (s, i) {
          return '<button class="stage-button ' + (i === stageIndex ? "active" : "") + '" type="button" data-stage-index="' + i + '">' + s.label + '</button>';
        }).join("") +
      '</div>' +

      renderStageFlow(stage) +

      renderPmNote(stage && stage.pmNote);
  }

  function renderProjectSection(title, body) {
    if (!body) return "";
    return '<div class="project-ordered-section">' +
      '<h4 class="project-ordered-heading">' + title + '</h4>' +
      body +
    '</div>';
  }

  function renderEvidenceDeliverable(project, artifactLinks) {
    var blocks = [
      renderResult(project),
      renderProjectNotes(project),
      artifactLinks
    ].filter(Boolean);
    return blocks.join("");
  }

  function renderInteractiveDemo(project, state, stageIndex) {
    var widget = renderWidgetPanel(project, state, stageIndex);
    var screenshots = renderScreenshotStrip(project, "Screenshots", "");
    if (!widget && !screenshots) return "";
    return (widget ? '<div class="algorithm-view algorithm-view-demo">' + widget + '</div>' : "") + screenshots;
  }

  function renderProjectNotes(project) {
    var owned = Array.isArray(project.owned) ? project.owned.slice(0, 2) : [];
    if (!owned.length) return "";

    return '<div class="project-note-grid project-note-grid-compact">' +
      '<div class="note-card">' +
        '<h4>Role</h4>' +
        '<ul class="compact-list">' +
          owned.map(function (item) { return '<li>' + item + '</li>'; }).join("") +
        '</ul>' +
      '</div>' +
    '</div>';
  }

  function renderMethodologyNotes(project) {
    var methodText = project.algorithmSummary && project.algorithmSummary !== project.summary
      ? project.algorithmSummary
      : "";
    if (!methodText) return "";
    return '<div class="project-note-grid project-note-grid-compact project-method-note-grid">' +
      '<div class="note-card note-card-lead">' +
        '<h4>Method</h4>' +
        '<p>' + methodText + '</p>' +
      '</div>' +
    '</div>';
  }

  function renderStageFlow(stage) {
    if (!stage) return "";

    return '<div class="aaron-flow-map">' +
      renderFlowNode("input", "Input", stage.inputTitle, stage.inputLines) +
      '<div class="aaron-flow-arrow" aria-hidden="true">→</div>' +
      renderFlowNode("logic", "Logic", stage.operationTitle, stage.operationLines) +
      '<div class="aaron-flow-arrow" aria-hidden="true">→</div>' +
      renderFlowNode("output", "Output", stage.outputTitle, stage.outputLines) +
    '</div>';
  }

  function renderFlowNode(kind, label, title, lines) {
    return '<article class="aaron-flow-node aaron-flow-node-' + kind + '">' +
      '<span class="card-label">' + label + '</span>' +
      '<h4>' + clipText(title, 42) + '</h4>' +
      '<ul class="compact-list">' + clipLines(lines, 2, 48).map(function (line) { return '<li>' + line + '</li>'; }).join("") + '</ul>' +
    '</article>';
  }

  function renderPmNote(note) {
    var text = clipText(note, 110);
    if (!text) return "";
    return '<div class="pm-note pm-note-compact"><p>' + text + '</p></div>';
  }

  function clipLines(lines, count, max) {
    return (lines || []).filter(Boolean).slice(0, count).map(function (line) {
      return clipText(line, max);
    });
  }

  function clipText(value, max) {
    var text = String(value || "").replace(/\s+/g, " ").trim();
    if (!text || text.length <= max) return text;
    return text.slice(0, Math.max(4, max - 1)).replace(/\s+\S*$/, "") + "…";
  }

  function renderArtifactLinks(project) {
    if (!Array.isArray(project.artifactLinks) || !project.artifactLinks.length) return "";
    var hasLiveDemo = false;
    var links = project.artifactLinks.filter(function (link) {
      var isLiveDemo = /open live demo|live demo|demo/i.test(link.label || "");
      if (!isLiveDemo) return true;
      if (hasLiveDemo) return false;
      hasLiveDemo = true;
      return true;
    });
    if (!links.length) return "";

    return '<div class="project-artifact-row">' +
      links.map(function (link) {
        return '<a class="' + getArtifactLinkClass(link) + '" href="' + link.href + '" target="_blank" rel="noreferrer">' +
          '<span>' + link.label + '</span>' +
          '<small>' + (link.note || "Artifact") + '</small>' +
        '</a>';
      }).join("") +
    '</div>';
  }

  function getArtifactLinkClass(link) {
    var isLiveDemo = /open live demo|live demo|demo/i.test(link.label || "");
    return "project-artifact-link" + (isLiveDemo ? " project-artifact-link-live" : "");
  }

  function renderSourceStory(data, project) {
    if (isAaronProfile(data)) return "";

    var blocks = [
      renderProblemStatement(project),
      renderApproach(data, project),
      renderResult(project)
    ].filter(Boolean);

    if (!blocks.length) return "";
    return '<div class="source-story-grid">' + blocks.join("") + '</div>';
  }

  function renderProblemStatement(project) {
    var p = project.problemStatement;
    if (!p) return "";

    var body;
    if (p.narrative) {
      body = '<p>' + p.narrative + '</p>';
    } else {
      var sentences = [];
      if (p.who && p.tension) sentences.push("For " + p.who + " facing " + p.tension + ".");
      else if (p.who) sentences.push("For " + p.who + ".");
      else if (p.tension) sentences.push(p.tension + ".");
      if (p.question) sentences.push('<strong>Unanswered question:</strong> ' + p.question);
      body = '<p>' + sentences.join(" ") + '</p>';
    }

    return '<section class="source-story-card">' +
      '<h4>Problem statement</h4>' +
      body +
    '</section>';
  }

  function renderApproach(data, project) {
    var a = project.approach;
    if (!a) return "";

    return '<section class="source-story-card">' +
      '<h4>Approach</h4>' +
      (a.description ? '<p>' + a.description + '</p>' : "") +
    '</section>';
  }

  function renderResult(project) {
    var r = Array.isArray(project.result) ? project.result : [];
    if (!r.length) return "";

    return '<section class="source-story-card source-story-card-dark">' +
      '<h4>Result</h4>' +
      '<ul class="compact-list">' +
        r.map(function (item) { return '<li>' + item + '</li>'; }).join("") +
      '</ul>' +
    '</section>';
  }

  function renderScreenshotStrip(project, title, actions) {
    var shots = Array.isArray(project.screenshots) ? project.screenshots : [];
    var html = shots.map(function (shot, idx) {
      if (!shot || !shot.src) return "";
      return '<button class="screenshot-thumb" type="button" data-screenshot-index="' + idx + '" aria-label="Open screenshot: ' + (shot.caption || shot.alt || "image " + (idx + 1)) + '">' +
        '<span class="screenshot-frame"><img src="' + shot.src + '" alt="' + (shot.alt || "") + '" loading="eager" onerror="this.closest(\'.screenshot-thumb\').classList.add(\'is-missing\')"></span>' +
        '<span class="screenshot-caption">' + (shot.caption || ("Screenshot " + (idx + 1))) + '</span>' +
      '</button>';
    }).join("");

    if (!html) return "";
    return '<section class="source-story-card source-story-card-wide">' +
      '<div class="source-story-card-head">' +
        '<h4>' + (title || "Visual evidence") + '</h4>' +
        (actions || "") +
      '</div>' +
      '<div class="screenshot-strip">' + html + '</div>' +
    '</section>';
  }

  function ensureScreenshotDialog() {
    var dlg = document.getElementById("screenshot-dialog");
    if (dlg) return dlg;

    dlg = document.createElement("dialog");
    dlg.id = "screenshot-dialog";
    dlg.className = "screenshot-dialog";
    dlg.innerHTML =
      '<button class="screenshot-dialog-nav screenshot-dialog-prev" type="button" aria-label="Previous">‹</button>' +
      '<figure class="screenshot-dialog-figure">' +
        '<button class="screenshot-dialog-close" type="button" aria-label="Close">×</button>' +
        '<img class="screenshot-dialog-img" alt="">' +
        '<figcaption class="screenshot-dialog-caption"></figcaption>' +
      '</figure>' +
      '<button class="screenshot-dialog-nav screenshot-dialog-next" type="button" aria-label="Next">›</button>';

    document.body.appendChild(dlg);

    dlg.addEventListener("click", function (event) {
      if (event.target === dlg) dlg.close();
    });
    dlg.querySelector(".screenshot-dialog-close").addEventListener("click", function () { dlg.close(); });
    dlg.querySelector(".screenshot-dialog-prev").addEventListener("click", function () { stepDialog(-1); });
    dlg.querySelector(".screenshot-dialog-next").addEventListener("click", function () { stepDialog(1); });
    document.addEventListener("keydown", function (event) {
      if (!dlg.open) return;
      if (event.key === "ArrowLeft") stepDialog(-1);
      if (event.key === "ArrowRight") stepDialog(1);
      if (event.key === "Escape" && typeof dlg.close === "function") dlg.close();
    });

    return dlg;
  }

  function openScreenshotDialog(project, index) {
    var shots = Array.isArray(project.screenshots) ? project.screenshots.filter(function (s) { return s && s.src; }) : [];
    if (!shots.length) return;
    var dlg = ensureScreenshotDialog();
    dlg._shots = shots;
    dlg._index = Math.max(0, Math.min(index, shots.length - 1));
    paintDialog(dlg);
    if (typeof dlg.showModal === "function") dlg.showModal();
    else dlg.setAttribute("open", "");
  }

  function stepDialog(delta) {
    var dlg = document.getElementById("screenshot-dialog");
    if (!dlg || !dlg._shots) return;
    var n = dlg._shots.length;
    dlg._index = (dlg._index + delta + n) % n;
    paintDialog(dlg);
  }

  function paintDialog(dlg) {
    var shot = dlg._shots[dlg._index];
    var img = dlg.querySelector(".screenshot-dialog-img");
    var cap = dlg.querySelector(".screenshot-dialog-caption");
    img.src = shot.src;
    img.alt = shot.alt || "";
    cap.textContent = shot.caption || "";
    dlg.querySelectorAll(".screenshot-dialog-nav").forEach(function (button) {
      button.style.display = dlg._shots.length > 1 ? "" : "none";
    });
  }

  ns.projects = { renderProjectsAccordion: renderProjectsAccordion };
})();

</script>
<script>
(function () {
  const ns = window.aiResume || (window.aiResume = {});
  const data = window.resumeContent;
  const ui = data.ui || {};
  const displayName = data.profile.shortName || data.profile.name;

  var SYSTEM_CONTEXT = buildContext();

  function buildContext() {
    var p = data.profile;
    var exp = data.experience.map(function (e) {
      return e.role + " at " + e.organization + " (" + e.dates + "): " + e.bullets.join(" ");
    }).join("\n");
    var edu = data.education.map(function (e) {
      return e.degree + ", " + e.school + " (" + e.dates + ")";
    }).join("; ");
    var projects = data.projects.map(function (proj) {
      return proj.title + " (" + proj.source + "): " + proj.summary;
    }).join("\n");
    var stack = data.stack.map(function (s) { return s.label; }).join(", ");
    var pubs = data.publications.map(function (pub) {
      return pub.title + " — " + pub.journal + " " + pub.year;
    }).join("\n");

    return [
      "You are an assistant embedded on " + p.name + "'s portfolio page.",
      "Answer questions about their background concisely and helpfully.",
      "If a question is unrelated, politely redirect to resume topics.",
      "\n--- Profile ---",
      p.summary,
      "\n--- Experience ---",
      exp,
      "\n--- Education ---",
      edu,
      "\n--- Projects ---",
      projects,
      "\n--- Tech Stack ---",
      stack,
      "\n--- Publications ---",
      pubs
    ].join("\n");
  }

  var GREETING = ui.chatGreeting || ("Hi! I can answer questions about " + displayName + "'s background, projects, publications, and skills. What would you like to know?");
  var messages = [];
  var isOpen = false;

  function inject() {
    /* FAB */
    var fab = document.createElement("button");
    fab.className = "chat-fab";
    fab.setAttribute("aria-label", "Open AI chat");
    fab.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    document.body.appendChild(fab);

    /* Chat window */
    var win = document.createElement("div");
    win.className = "chat-window";
    win.id = "chat-window";
    win.innerHTML =
      '<div class="chat-header">' +
        '<span class="chat-header-title">' + (ui.chatTitle || ("Ask about " + displayName)) + '</span>' +
        '<button class="chat-close" aria-label="Close chat">&times;</button>' +
      '</div>' +
      '<div class="chat-messages" id="chat-messages"></div>' +
      '<form class="chat-input-row" id="chat-form">' +
        '<input class="chat-input" id="chat-input" type="text" placeholder="' + (ui.chatPlaceholder || "Ask a question...") + '" autocomplete="off">' +
        '<button class="chat-send" type="submit">Send</button>' +
      '</form>';
    document.body.appendChild(win);

    fab.addEventListener("click", toggle);
    win.querySelector(".chat-close").addEventListener("click", toggle);
    document.getElementById("chat-form").addEventListener("submit", handleSubmit);

    messages = [{ role: "assistant", content: GREETING }];
    renderMessages();
  }

  function toggle() {
    isOpen = !isOpen;
    document.getElementById("chat-window").classList.toggle("is-open", isOpen);
    if (isOpen) document.getElementById("chat-input").focus();
  }

  function renderMessages() {
    var container = document.getElementById("chat-messages");
    container.innerHTML = messages.map(function (msg) {
      return '<div class="chat-bubble ' + msg.role + '">' + escapeHtml(msg.content) + '</div>';
    }).join("");
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    var container = document.getElementById("chat-messages");
    container.innerHTML += '<div class="chat-bubble typing" id="typing-indicator">Thinking...</div>';
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    var el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function handleSubmit(e) {
    e.preventDefault();
    var input = document.getElementById("chat-input");
    var text = input.value.trim();
    if (!text) return;

    messages.push({ role: "user", content: text });
    input.value = "";
    renderMessages();
    showTyping();

    var reply = await getReply(text);
    hideTyping();
    messages.push({ role: "assistant", content: reply });
    renderMessages();
  }

  async function getReply(userText) {
    var timeoutId = null;
    try {
      var controller = typeof AbortController !== "undefined" ? new AbortController() : null;
      timeoutId = controller ? window.setTimeout(function () {
        controller.abort();
      }, 8000) : null;
      var res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: controller ? controller.signal : undefined,
        body: JSON.stringify({
          context: SYSTEM_CONTEXT,
          messages: messages.filter(function (m) {
            return m.role === "user" || (m.role === "assistant" && m.content !== GREETING);
          }).concat([{ role: "user", content: userText }]).slice(-10)
        })
      });
      if (timeoutId) window.clearTimeout(timeoutId);
      if (res.ok) {
        var json = await res.json();
        if (json && json.reply) return json.reply;
      }
    } catch (_) { /* fall through */ }
    if (timeoutId) window.clearTimeout(timeoutId);

    return localFallback(userText);
  }

  function localFallback(text) {
    var lower = text.toLowerCase();

    if (lower.includes("experience") || lower.includes("work") || lower.includes("job"))
      return data.experience.map(function (e) { return e.role + " at " + e.organization + " (" + e.dates + ")"; }).join("\n");

    if (lower.includes("education") || lower.includes("degree") || lower.includes("school"))
      return data.education.map(function (e) { return e.degree + " \u2014 " + e.school + " (" + e.dates + ")"; }).join("\n");

    if (lower.includes("project"))
      return data.projects.map(function (p) { return p.navTitle + ": " + p.summary; }).join("\n\n");

    if (lower.includes("publication") || lower.includes("paper"))
      return data.publications.map(function (p) { return p.title + " \u2014 " + p.journal + " (" + p.year + ")"; }).join("\n\n");

    if (lower.includes("skill") || lower.includes("tech") || lower.includes("stack") || lower.includes("tool"))
      return "Tech stack: " + data.stack.map(function (s) { return s.label; }).join(", ") + ".";

    if (lower.includes("contact") || lower.includes("email") || lower.includes("phone"))
      return [
        data.profile.email ? "Email: " + data.profile.email : null,
        data.profile.phone ? "Phone: " + data.profile.phone : null,
        data.profile.website ? "Website: " + data.profile.website : null
      ].filter(Boolean).join(" | ");

    if (lower.includes("strength") || lower.includes("about"))
      return data.profile.summary;

      return "I can answer questions about " + displayName + "'s experience, education, projects, publications, skills, and contact info. What would you like to know?";
  }

  function escapeHtml(text) {
    var div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, "<br>");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", inject);
  } else {
    inject();
  }

  ns.chat = { toggle: toggle };
})();

</script>
<script>
(function () {
  const ns = window.aiResume;
  const data = window.resumeContent;

  if (!data) {
    throw new Error("AI Resume V7 could not find an active profile. Check assets/data/profiles.js and the profile query string.");
  }

  const state = ns.state.create(data);
  window.aiResumeState = state;

  applyDocumentMeta(data);
  document.body.setAttribute("data-profile", window.resumeCandidateId || data.id || "");

  if (ns.modes && ns.modes.init) {
    ns.modes.init(state);
  }

  if (ns.shell && ns.shell.render) {
    ns.shell.render(data, state);
    ns.shell.syncMode(state);
  }

  var experienceCallbacks = {
    onExperienceActivate: function (expId) {
      state.activeExpId = expId;
      ns.skills.updateHighlights(data, state);
    },
    onExperienceDeactivate: function () {
      state.activeExpId = null;
      ns.skills.updateHighlights(data, state);
    },
    onExperienceHover: function (expId) {
      state.hoverExpId = expId;
      ns.skills.updateHighlights(data, state);
    },
    onExperienceLeave: function () {
      state.hoverExpId = null;
      ns.skills.updateHighlights(data, state);
    }
  };

  var projectCallbacks = {
    onProjectActivate: function (projectId) {
      state.activeProjectId = projectId;
      ns.skills.updateHighlights(data, state);
    },
    onProjectDeactivate: function () {
      state.activeProjectId = null;
      ns.skills.updateHighlights(data, state);
    },
    onProjectHover: function (projectId) {
      state.hoverProjectId = projectId;
      ns.skills.updateHighlights(data, state);
    },
    onProjectLeave: function () {
      state.hoverProjectId = null;
      ns.skills.updateHighlights(data, state);
    }
  };

  function renderFilteredSections() {
    if (ns.projects && ns.projects.renderProjectsAccordion) {
      ns.projects.renderProjectsAccordion(data, state, projectCallbacks);
    }
    if (ns.pages && ns.pages.renderExperience) {
      ns.pages.renderExperience(data, experienceCallbacks);
    }
  }

  /* ── Render all static sections ────────────── */
  ns.pages.renderPage1(data);

  /* ── Render skill filters before dependent lists ─ */
  ns.skills.renderSkillPanels(data, state, {
    onFilterChange: function () {
      state.activeProjectId = null;
      state.hoverProjectId = null;
      state.activeExpId = null;
      state.hoverExpId = null;
      state.showAllProjects = false;
      renderFilteredSections();
      ns.skills.updateHighlights(data, state);
    }
  });

  renderFilteredSections();
  ns.pages.renderEducation(data);
  ns.pages.renderAwards(data);
  ns.pages.renderPublications(data);
  ns.pages.renderCoursework(data);
  ns.pages.renderProfileMaterials(data);

  var initialProjectId = getInitialProjectId(data);
  if (initialProjectId) {
    var initialProjectHeader = document.querySelector('.project-accordion-item[data-project-id="' + initialProjectId + '"] .project-accordion-header');
    if (initialProjectHeader) {
      initialProjectHeader.click();
      setTimeout(function () {
        var projectPage = document.getElementById("page-3");
        if (projectPage) projectPage.scrollIntoView({ block: "start" });
      }, 50);
    }
  }

  var initialPage = ns.pages.detectCurrentPage ? ns.pages.detectCurrentPage() : 1;
  state.currentPage = initialPage;
  document.body.setAttribute("data-current-page", String(initialPage));
  document.querySelectorAll(".page-dot").forEach(function (dot) {
    dot.classList.toggle("active", Number(dot.dataset.target) === initialPage);
  });
  if (ns.skills.syncToPage) {
    ns.skills.syncToPage(initialPage, { immediate: true });
  }

  /* ── Setup GSAP scroll animations ──────────── */
  ns.pages.setupScrollAnimations(state);

  function applyDocumentMeta(candidateData) {
    var ui = candidateData.ui || {};
    var description = ui.metaDescription || "";
    var meta = document.querySelector('meta[name="description"]');

    document.title = ui.metaTitle || (candidateData.profile.name + " | AI Resume User V7");

    if (meta && description) {
      meta.setAttribute("content", description);
    }
  }

  function getInitialProjectId(candidateData) {
    var projectIds = candidateData.projects.map(function (project) { return project.id; });
    var projectId = null;
    try {
      var url = new URL(window.location.href);
      projectId = url.searchParams.get("project");
      if (!projectId && url.hash.indexOf("project-") === 1) {
        projectId = url.hash.replace("#project-", "");
      }
    } catch (e) {
      projectId = null;
    }
    return projectIds.indexOf(projectId) !== -1 ? projectId : null;
  }
})();

</script>
