}

.research-control-flow {
  margin-top: 0.15rem;
}

.research-workflow-panel,
.research-hypothesis-panel,
.research-evidence-panel,
.research-issue-card,
.research-confidence-card,
.research-evidence-card,
.research-conclusion-card {
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
}

.research-workflow-panel,
.research-hypothesis-panel,
.research-evidence-panel {
  padding: 1rem;
  display: grid;
  gap: 0.85rem;
}

.research-step-rail {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.45rem;
}

.research-step-chip {
  display: grid;
  gap: 0.2rem;
  padding: 0.55rem;
  border-radius: 14px;
  background: #f8fafc;
}

.research-step-chip span {
  font-family: var(--mono);
  color: var(--project-accent, var(--accent));
  font-size: 0.7rem;
  font-weight: 800;
}

.research-step-chip strong {
  font-size: 0.72rem;
}

.research-issue-grid {
  display: grid;
  gap: 0.6rem;
}

.research-issue-card {
  padding: 0.75rem;
}

.research-issue-card h5 {
  margin-bottom: 0.45rem;
  color: var(--ink);
}

.research-issue-card ul {
  padding-left: 1rem;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.45;
}

.research-hypothesis-list {
  display: grid;
  gap: 0.55rem;
}

.research-hypothesis-button {
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 16px;
  background: #ffffff;
  padding: 0.72rem;
  display: grid;
  gap: 0.25rem;
  text-align: left;
  cursor: pointer;
}

.research-hypothesis-button span {
  width: max-content;
  padding: 0.12rem 0.38rem;
  border-radius: 999px;
  background: rgba(29, 78, 216, 0.1);
  color: #1d4ed8;
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 800;
}

.research-hypothesis-button strong {
  font-size: 0.82rem;
  line-height: 1.3;
}

.research-hypothesis-button small {
  color: var(--muted);
  font-size: 0.72rem;
}

.research-hypothesis-button.active {
  border-color: var(--project-accent, #1d4ed8);
  background: color-mix(in srgb, var(--project-accent, #1d4ed8) 8%, #ffffff);
}

.research-confidence-card,
.research-evidence-card,
.research-conclusion-card {
  padding: 0.9rem;
}

.research-confidence-card {
  display: grid;
  gap: 0.45rem;
}

.research-confidence-card strong {
  line-height: 1.3;
}

.research-confidence-card small {
  color: var(--muted);
  font-family: var(--mono);
}

.research-confidence-track {
  height: 11px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.08);
  overflow: hidden;
}

.research-confidence-track span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, var(--project-accent, #1d4ed8), #f59e0b);
  border-radius: inherit;
}

.research-evidence-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
}

.research-evidence-card {
  border-left: 0;
}

.research-evidence-card.is-against {
  border-left-color: transparent;
}

.research-evidence-card span,
.research-conclusion-card span {
  display: block;
  margin-bottom: 0.45rem;
}

.research-conclusion-card {
  background: #0f172a;
  color: #ffffff;
}

.research-conclusion-card p,
.research-conclusion-card span {
  color: rgba(255, 255, 255, 0.74);
}

.research-conclusion-card strong {
  display: block;
  margin-bottom: 0.55rem;
  line-height: 1.35;
}

/* ── 0. Policy lab widget ─────────────────── */

.widget-panel-policy-lab {
  background: linear-gradient(180deg, rgba(15, 118, 110, 0.04), rgba(255, 255, 255, 0.98));
}

.policy-patient-strip {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.7rem;
}

.policy-patient-card {
  display: grid;
  gap: 0.3rem;
  padding: 0.85rem 0.95rem;
  border: 1px solid rgba(148, 163, 184, 0.22);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.92);
  text-align: left;
  cursor: pointer;
  font: inherit;
  transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
}

.policy-patient-card:hover {
  transform: translateY(-1px);
  border-color: rgba(15, 118, 110, 0.28);
  box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
}

.policy-patient-card.active {
  border-color: rgba(15, 118, 110, 0.44);
  background: linear-gradient(160deg, rgba(15, 118, 110, 0.1), rgba(255, 255, 255, 0.98));
  box-shadow: 0 18px 32px rgba(15, 118, 110, 0.12);
}

.policy-patient-card strong {
  color: var(--ink);
  font-size: 0.95rem;
}

.policy-patient-card span {
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 1.45;
}

.policy-explainer-bar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 0.8rem;
}

.policy-explainer-step {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.65rem;
  align-items: start;
  padding: 0.8rem 0.9rem;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.82);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.policy-step-index {
  display: inline-grid;
  place-items: center;
  width: 34px;
  height: 34px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 0.74rem;
  font-weight: 700;
}

.policy-explainer-step strong,
.cluster-profile-card strong {
  display: block;
  color: var(--ink);
}

.policy-explainer-step span:last-child {
  display: block;
  margin-top: 0.15rem;
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 1.45;
}

.policy-lab-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.9fr);
  gap: 1rem;
  align-items: start;
}

.policy-stage-stack {
  display: grid;
  gap: 0.75rem;
}

.policy-stage-card {
  display: grid;
  gap: 0.75rem;
  padding: 1rem;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(148, 163, 184, 0.2);
}

.policy-stage-card.is-stage2 {
  background: linear-gradient(160deg, rgba(15, 118, 110, 0.1), rgba(255, 255, 255, 0.96));
}

.policy-stage-card.is-stage1 {
  background: linear-gradient(160deg, rgba(29, 78, 216, 0.08), rgba(255, 255, 255, 0.96));
}

.policy-stage-head {
  display: grid;
  gap: 0.2rem;
}

.policy-stage-kicker {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

.policy-stage-head h5 {
  font-size: 1rem;
  color: var(--ink);
}

.policy-stage-copy {
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.55;
}

.policy-decision-banner {
  display: flex;
  justify-content: space-between;
  gap: 0.8rem;
  align-items: center;
  padding: 0.8rem 0.9rem;
  border-radius: 14px;
  background: rgba(15, 23, 42, 0.04);
}

.policy-decision-banner span {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.policy-decision-banner strong {
  color: var(--ink);
  font-size: 0.95rem;
  text-align: right;
}

.policy-back-arrow {
  justify-self: center;
  padding: 0.12rem 0.65rem;
  border-radius: 999px;
  background: rgba(15, 118, 110, 0.08);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.policy-choice-list,
.policy-method-list,
.cluster-signal-list,
.cluster-compare-list {
  display: grid;
  gap: 0.6rem;
}

.policy-choice-row,
.cluster-signal-row {
  display: grid;
  gap: 0.32rem;
}

.policy-choice-meta,
.cluster-signal-meta {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  align-items: baseline;
}

.policy-choice-label,
.cluster-signal-meta span {
  color: var(--ink);
  font-size: 0.84rem;
  font-weight: 700;
}

.policy-choice-meta strong,
.cluster-signal-meta strong {
  font-family: var(--mono);
  font-size: 0.76rem;
  color: var(--muted);
}

.policy-choice-track,
.cluster-signal-track {
  height: 10px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.08);
  overflow: hidden;
}

.policy-choice-fill,
.cluster-signal-fill {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), #1d4ed8);
}

.policy-choice-note {
  margin: 0;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.45;
}

.policy-insight-panel,
.cluster-profile-panel,
.cluster-validation-panel {
  display: grid;
  gap: 0.75rem;
  align-content: start;
}

.policy-insight-card,
.cluster-profile-card {
  display: grid;
  gap: 0.45rem;
  padding: 0.95rem 1rem;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.policy-insight-card.is-smart,
.cluster-profile-card.is-smart {
  background: linear-gradient(160deg, rgba(180, 83, 9, 0.1), rgba(255, 255, 255, 0.96));
  border-color: rgba(180, 83, 9, 0.18);
}

.cluster-profile-card.is-primary {
  background: linear-gradient(160deg, rgba(29, 78, 216, 0.08), rgba(255, 255, 255, 0.98));
}

.policy-insight-card p,
.cluster-profile-card p {
  margin: 0;
  color: var(--muted);
  font-size: 0.86rem;
  line-height: 1.55;
}

.policy-tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}

.policy-tag {
  display: inline-flex;
  align-items: center;
  min-height: 1.8rem;
  padding: 0.3rem 0.58rem;
  border-radius: 999px;
  background: rgba(15, 118, 110, 0.09);
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 700;
}

.policy-method-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 0.55rem;
  align-items: center;
}

.policy-method-name {
  color: var(--ink);
  font-size: 0.84rem;
  font-weight: 700;
}

.policy-method-score {
  font-family: var(--mono);
  font-size: 0.76rem;
  color: var(--muted);
}

.policy-method-status,
.cluster-compare-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 1.6rem;
  padding: 0.18rem 0.5rem;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.policy-method-status.is-best,
.cluster-compare-tag.is-best {
  background: rgba(15, 118, 110, 0.12);
  color: var(--accent);
}

.policy-method-status.is-watch,
.cluster-compare-tag.is-watch {
  background: rgba(180, 83, 9, 0.14);
  color: #b45309;
}

.policy-method-status.is-baseline,
.cluster-compare-tag.is-baseline {
  background: rgba(148, 163, 184, 0.16);
  color: #475569;
}

/* ── 0b. Cluster topology lab ─────────────── */

.widget-panel-cluster-topology-lab {
  background: linear-gradient(180deg, rgba(29, 78, 216, 0.04), rgba(255, 255, 255, 0.98));
}

.cluster-lab-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr) minmax(260px, 0.82fr);
  gap: 1rem;
  align-items: start;
}

.cluster-map-panel {
  display: grid;
  gap: 0.8rem;
}

.cluster-map-head {
  display: flex;
  justify-content: space-between;
  gap: 0.8rem;
  align-items: start;
}

.cluster-map-head strong {
  color: var(--ink);
  font-size: 0.94rem;
}

.cluster-metric-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: flex-end;
}

.cluster-metric-pills span {
  display: inline-flex;
  align-items: center;
  min-height: 1.8rem;
  padding: 0.3rem 0.55rem;
  border-radius: 999px;
  background: rgba(29, 78, 216, 0.08);
  color: #1d4ed8;
  font-family: var(--mono);
  font-size: 0.72rem;
}

.cluster-map-frame {
  padding: 0.8rem;
  border-radius: 18px;
  background: radial-gradient(circle at 30% 22%, rgba(29, 78, 216, 0.1), rgba(255, 255, 255, 0.98) 70%);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.cluster-map-svg {
  display: block;
  width: 100%;
  aspect-ratio: 120 / 86;
}

.cluster-link {
  stroke: rgba(15, 23, 42, 0.14);
  stroke-width: 1;
}

.cluster-link.is-active {
  stroke: rgba(29, 78, 216, 0.42);
  stroke-width: 1.6;
}

.cluster-node circle {
  fill: color-mix(in srgb, var(--node-color) 62%, #e2e8f0);
  opacity: 0.72;
  transition: opacity 180ms ease, stroke 180ms ease, stroke-width 180ms ease, transform 180ms ease;
}

.cluster-node text {
  fill: #0f172a;
  font-family: var(--mono);
  font-size: 4px;
  font-weight: 700;
  pointer-events: none;
}

.cluster-node.is-active circle {
  opacity: 1;
  stroke: rgba(15, 23, 42, 0.5);
  stroke-width: 2;
  filter: drop-shadow(0 6px 10px rgba(29, 78, 216, 0.22));
}

.cluster-chip-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 0.55rem;
}

.cluster-chip {
  display: grid;
  gap: 0.12rem;
  padding: 0.7rem 0.8rem;
  border-radius: 14px;
  border: 1px solid rgba(148, 163, 184, 0.2);
  background: rgba(255, 255, 255, 0.94);
  text-align: left;
  font: inherit;
  cursor: pointer;
  transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
}

.cluster-chip:hover {
  transform: translateY(-1px);
}

.cluster-chip.active {
  border-color: rgba(29, 78, 216, 0.38);
  box-shadow: 0 14px 26px rgba(29, 78, 216, 0.1);
}

.cluster-chip span {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.cluster-chip strong {
  color: var(--ink);
  font-size: 0.86rem;
}

.cluster-compare-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.65rem;
  align-items: start;
  padding: 0.75rem 0.8rem;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid rgba(148, 163, 184, 0.16);
}

.cluster-compare-row strong {
  color: var(--ink);
  font-size: 0.86rem;
}

.cluster-compare-row span {
  display: block;
  margin-top: 0.15rem;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.45;
}

/* ── 1. Tradeoff-frontier widget ──────────── */

.tradeoff-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
  gap: 1.2rem;
  align-items: stretch;
}

.frontier-panel {
  display: grid;
  gap: 0.6rem;
}

.frontier-svg {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: linear-gradient(160deg, rgba(15, 118, 110, 0.04), rgba(255, 255, 255, 0));
  border-radius: 14px;
}

.frontier-axis {
  stroke: rgba(15, 23, 42, 0.3);
  stroke-width: 0.5;
}

.frontier-axis-label {
  font-family: var(--mono);
  font-size: 3px;
  fill: var(--muted);
  letter-spacing: 0.08em;
}

.frontier-curve {
  fill: none;
  stroke: var(--accent);
  stroke-width: 0.8;
  stroke-dasharray: 1.5 1.5;
  opacity: 0.55;
}

.frontier-dot {
  cursor: pointer;
}

.frontier-dot circle {
  fill: rgba(15, 118, 110, 0.55);
  transition: fill 160ms ease, r 160ms ease;
}

.frontier-dot text {
  font-family: var(--mono);
  font-size: 3px;
  fill: var(--ink);
  letter-spacing: 0.02em;
}

.frontier-dot.is-active circle {
  fill: var(--accent);
  r: 4.6;
  filter: drop-shadow(0 2px 3px rgba(15, 118, 110, 0.4));
}

.frontier-dot.is-baseline circle {
  fill: rgba(100, 116, 139, 0.55);
}

.frontier-dot.is-baseline text {
  fill: var(--muted);
  font-style: italic;
}

.frontier-callout {
  display: grid;
  gap: 0.8rem;
  padding: 1rem 1.1rem;
  background: linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.9));
  border-radius: 16px;
  border: 1px solid rgba(15, 118, 110, 0.18);
}

.frontier-winner {
  display: grid;
  gap: 0.25rem;
}

.frontier-score {
  font-size: 2.6rem;
  font-family: var(--serif);
  color: var(--ink);
  line-height: 1;
}

.frontier-delta {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.frontier-takeaway {
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--ink);
}

.frontier-ranking .ranking-row {
  display: grid;
  grid-template-columns: 1fr 120px 48px;
  align-items: center;
  gap: 0.8rem;
  padding: 0.4rem 0;
}

.frontier-ranking .ranking-match {
  grid-column: 1 / -1;
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: -0.25rem;
}

/* ── 2. Evidence-path widget ──────────────── */

.evidence-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.15fr);
  gap: 1.2rem;
  align-items: stretch;
}

.evidence-graph-wrap {
  display: grid;
  gap: 0.5rem;
}

.evidence-svg {
  aspect-ratio: 1 / 1;
  background: radial-gradient(circle at 30% 30%, rgba(29, 78, 216, 0.08), transparent 60%);
  border-radius: 14px;
}

.graph-edge {
  stroke: rgba(15, 23, 42, 0.22);
  stroke-width: 0.6;
  transition: stroke 220ms ease, stroke-width 220ms ease;
}

.graph-edge.highlighted {
  stroke: var(--accent);
  stroke-width: 1.3;
  filter: drop-shadow(0 2px 3px rgba(15, 118, 110, 0.28));
}

.graph-node-group circle {
  fill: rgba(15, 23, 42, 0.28);
  transition: fill 220ms ease, r 220ms ease;
}

.graph-node-group text {
  font-family: var(--mono);
  font-size: 4.5px;
  fill: var(--ink);
  letter-spacing: 0.03em;
}

.graph-node-group.highlighted circle {
  fill: var(--accent);
  r: 9.5;
}

.evidence-answer {
  display: grid;
  gap: 0.9rem;
  align-content: start;
}

.evidence-trace {
  display: flex;
  align-items: center;
  gap: 1.1rem;
  padding: 0.85rem 1rem;
  background: linear-gradient(160deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.9));
  border-radius: 16px;
}

.trace-dial {
  --score: 50%;
  position: relative;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background:
    conic-gradient(var(--accent) var(--score), rgba(15, 118, 110, 0.15) 0);
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.trace-dial::before {
  content: "";
  position: absolute;
  inset: 8px;
  background: var(--paper);
  border-radius: 50%;
}

.trace-dial-value {
  position: relative;
  font-family: var(--serif);
  font-size: 1.6rem;
  color: var(--ink);
  line-height: 1;
}

.trace-dial-unit {
  position: relative;
  font-family: var(--mono);
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-top: 0.2rem;
}

.trace-meta {
  display: grid;
  gap: 0.4rem;
  flex: 1;
}

.trace-meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
}

.trace-meta-row span { color: var(--muted); }
.trace-meta-row strong { color: var(--ink); }

.evidence-answer-card {
  padding: 1rem 1.1rem;
  background: var(--paper);
  border-radius: 16px;
  border: 1px solid var(--line);
  display: grid;
  gap: 0.6rem;
}

.evidence-answer-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.evidence-answer-text {
  font-size: 0.96rem;
  line-height: 1.5;
  color: var(--ink);
}

.evidence-claim-list {
  display: grid;
  gap: 0.4rem;
  list-style: none;
}

.evidence-claim {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  font-size: 0.85rem;
  color: var(--ink);
}

.evidence-claim-mark {
  width: 20px;
  height: 20px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
}

.evidence-claim.is-supported .evidence-claim-mark {
  background: var(--accent-soft);
  color: var(--accent);
}

.evidence-claim.is-unsupported .evidence-claim-mark {
  background: rgba(220, 38, 38, 0.14);
  color: #b91c1c;
}

.evidence-claim.is-unsupported span:last-child {
  color: var(--muted);
  text-decoration: line-through;
}

/* ── 3. Threshold-dials widget ────────────── */

.widget-panel-threshold-dials .slider-label {
  display: block;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.threshold-rail {
  position: relative;
  padding: 0.8rem 0 1.4rem;
}

.threshold-rail .threshold-band {
  position: absolute;
  top: 1.05rem;
  height: 12px;
  background: rgba(15, 118, 110, 0.22);
  border-radius: 999px;
}

.threshold-input {
  position: relative;
  z-index: 2;
  width: 100%;
  -webkit-appearance: none;
  background: transparent;
  height: 20px;
}

.threshold-input::-webkit-slider-runnable-track {
  height: 8px;
  background: var(--line);
  border-radius: 999px;
}

.threshold-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  margin-top: -6px;
  background: var(--accent);
  border-radius: 50%;
  border: 3px solid var(--paper);
  box-shadow: 0 4px 10px rgba(15, 118, 110, 0.35);
  cursor: pointer;
}

.threshold-input::-moz-range-track {
  height: 8px;
  background: var(--line);
  border-radius: 999px;
}

.threshold-input::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: var(--accent);
  border: 3px solid var(--paper);
  border-radius: 50%;
  box-shadow: 0 4px 10px rgba(15, 118, 110, 0.35);
}

.threshold-marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(15, 118, 110, 0.55);
  pointer-events: none;
}

.dial-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.9rem;
}

.dial {
  display: grid;
  place-items: center;
}

.dial-ring {
  --dial: 50%;
  position: relative;
  width: 128px;
  height: 128px;
  border-radius: 50%;
  background:
    conic-gradient(var(--accent) var(--dial), rgba(15, 118, 110, 0.12) 0);
  display: grid;
  place-items: center;
}

.dial-ring::before {
  content: "";
  position: absolute;
  inset: 10px;
  background: var(--paper);
  border-radius: 50%;
}

.dial.is-winner .dial-ring {
  background:
    conic-gradient(#b45309 var(--dial), rgba(180, 83, 9, 0.15) 0);
  box-shadow: 0 10px 24px rgba(180, 83, 9, 0.22);
}

.dial-reading {
  position: relative;
  font-family: var(--serif);
  font-size: 1.7rem;
  color: var(--ink);
  line-height: 1;
}

.dial-label {
  position: relative;
  font-family: var(--mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 0.35rem;
}

.preset-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.6rem;
}

.preset-button {
  display: grid;
  gap: 0.3rem;
  padding: 0.7rem 0.9rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
}

.preset-button:hover {
  transform: translateY(-1px);
  border-color: rgba(180, 83, 9, 0.4);
}

.preset-button.active {
  border-color: rgba(180, 83, 9, 0.55);
  background: rgba(180, 83, 9, 0.08);
}

.preset-label {
  font-weight: 700;
  color: var(--ink);
}

.preset-note {
  font-size: 0.78rem;
  color: var(--muted);
}

.deliverable-card {
  padding: 1rem 1.1rem;
  border-radius: 16px;
  display: grid;
  gap: 0.6rem;
}

.deliverable-card.is-stable {
  background: linear-gradient(160deg, rgba(15, 118, 110, 0.1), rgba(255, 255, 255, 0.95));
  border: 1px solid rgba(15, 118, 110, 0.28);
}

.deliverable-card.is-warning {
  background: linear-gradient(160deg, rgba(180, 83, 9, 0.1), rgba(255, 255, 255, 0.92));
  border: 1px solid rgba(180, 83, 9, 0.3);
}

.deliverable-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 0.8rem;
}

.deliverable-label {
  font-family: var(--mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.deliverable-status {
  font-weight: 700;
  color: var(--ink);
  font-size: 0.9rem;
}

.deliverable-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.8rem;
}

.deliverable-metric {
  display: grid;
  gap: 0.25rem;
}

.deliverable-metric span {
  font-family: var(--mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.deliverable-metric strong {
  font-size: 0.95rem;
  color: var(--ink);
}

/* ── 4. Estimator forest plot ─────────────── */

.forest-wrap {
  display: grid;
  gap: 0.6rem;
}

.forest-axis {
  display: grid;
  grid-template-columns: 100px 1fr 100px;
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.forest-axis-mid {
  text-align: center;
  color: var(--ink);
}

.forest-axis-max { text-align: right; }

.forest-track-wrap {
  position: relative;
  display: grid;
  gap: 0.35rem;
  padding: 0.6rem 0;
}

.forest-ref {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: repeating-linear-gradient(to bottom, rgba(15, 23, 42, 0.35) 0 3px, transparent 3px 7px);
  z-index: 1;
}

.forest-row {
  display: grid;
  grid-template-columns: 160px 1fr 160px;
  align-items: center;
  gap: 1rem;
  padding: 0.55rem 0.7rem;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 12px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: background 160ms ease, border-color 160ms ease;
}

.forest-row:hover {
  background: rgba(124, 58, 237, 0.05);
}

.forest-row.is-active {
  border-color: rgba(124, 58, 237, 0.4);
  background: rgba(124, 58, 237, 0.08);
}

.forest-row.is-winner .forest-label::after {
  content: " \2605";
  color: var(--accent);
}

.forest-label {
  font-weight: 700;
  color: var(--ink);
}

.forest-track {
  position: relative;
  height: 16px;
  background: linear-gradient(to right, transparent, rgba(15, 23, 42, 0.05), transparent);
  border-radius: 999px;
}

.forest-ci {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 4px;
  background: rgba(124, 58, 237, 0.45);
  border-radius: 999px;
}

.forest-row.is-active .forest-ci,
.forest-row.is-winner .forest-ci {
  background: rgba(124, 58, 237, 0.85);
  height: 6px;
}

.forest-dot {
  position: absolute;
  top: 50%;
  width: 12px;
  height: 12px;
  transform: translate(-50%, -50%);
  background: #7c3aed;
  border-radius: 50%;
  border: 3px solid var(--paper);
  box-shadow: 0 2px 6px rgba(124, 58, 237, 0.35);
}

.forest-hr {
  display: flex;
  align-items: baseline;
  gap: 0.45rem;
  font-family: var(--mono);
  color: var(--ink);
}

.forest-hr strong {
  font-size: 1.05rem;
}

.forest-ci-text {
  font-size: 0.76rem;
  color: var(--muted);
}

.forest-callout {
  padding: 0.9rem 1.1rem;
  background: linear-gradient(160deg, rgba(124, 58, 237, 0.08), rgba(255, 255, 255, 0.95));
  border-radius: 14px;
  border: 1px solid rgba(124, 58, 237, 0.22);
  display: grid;
  gap: 0.45rem;
}

.forest-callout-head {
  display: flex;
  align-items: baseline;
  gap: 0.8rem;
}

.forest-callout-head strong {
  font-size: 1.1rem;
  color: var(--ink);
}

.forest-pvalue {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--muted);
}

.subgroup-panel {
  display: grid;
  gap: 0.4rem;
  padding-top: 0.4rem;
  border-top: 1px solid var(--line);
}

.subgroup-title {
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--ink);
}

.subgroup-row {
  display: grid;
  grid-template-columns: 200px 1fr 60px;
  align-items: center;
  gap: 0.8rem;
  padding: 0.3rem 0;
}

.subgroup-label {
  font-size: 0.88rem;
  color: var(--ink);
}

.subgroup-track {
  position: relative;
  height: 12px;
}

.subgroup-ci {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 3px;
  background: rgba(124, 58, 237, 0.3);
  border-radius: 999px;
}

.subgroup-dot {
  position: absolute;
  top: 50%;
  width: 9px;
  height: 9px;
  transform: translate(-50%, -50%);
  background: #7c3aed;
  border-radius: 50%;
  border: 2px solid var(--paper);
}

.subgroup-hr {
  text-align: right;
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--ink);
}

/* ── 5. Neural workbench ──────────────────── */

.widget-panel-neural-workbench {
  background:
    linear-gradient(180deg, rgba(15, 23, 42, 0.03), rgba(255, 255, 255, 0.98)),
    var(--paper);
}

.neural-workbench {
  display: grid;
  grid-template-columns: minmax(220px, 0.82fr) minmax(360px, 1.5fr) minmax(240px, 0.95fr);
  gap: 1rem;
  align-items: stretch;
}

.neural-input-panel,
.neural-scene-panel,
.neural-output-panel {
  display: grid;
  gap: 0.8rem;
  align-content: start;
  min-width: 0;
}

.neural-panel-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 0.65rem;
}

.neural-panel-head span {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.neural-panel-head strong {
  font-size: 0.94rem;
  color: var(--ink);
  text-align: right;
}

.neural-draw-canvas,
.neural-scene-canvas {
  display: block;
  width: 100%;
  border-radius: 14px;
  background: #0f172a;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08), 0 14px 34px rgba(15, 23, 42, 0.16);
}

.neural-draw-canvas {
  aspect-ratio: 1 / 1;
  cursor: crosshair;
  touch-action: none;
}

.neural-scene-canvas {
  height: clamp(320px, 34vw, 420px);
}

.neural-tool-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 0.65rem;
  align-items: center;
}

.neural-icon-button {
  min-height: 38px;
  padding: 0.55rem 0.75rem;
  border: 1px solid rgba(15, 23, 42, 0.12);
  border-radius: 12px;
  background: #ffffff;
  color: var(--ink);
  font: inherit;
  font-weight: 700;
  cursor: pointer;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.neural-icon-button:hover {
  transform: translateY(-1px);
  border-color: rgba(180, 83, 9, 0.35);
  background: rgba(180, 83, 9, 0.06);
}

.neural-brush-label,
.neural-threshold-label {
  display: grid;
  gap: 0.35rem;
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
}

.neural-brush-label input,
.neural-threshold-input {
  width: 100%;
  accent-color: #b45309;
}

.neural-preset-grid {
  display: grid;
  gap: 0.55rem;
}

.neural-preset-button {
  display: grid;
  gap: 0.25rem;
  min-height: 58px;
  padding: 0.62rem 0.75rem;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #ffffff;
  text-align: left;
  font-family: inherit;
  cursor: pointer;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.neural-preset-button:hover {
  transform: translateY(-1px);
  border-color: rgba(15, 118, 110, 0.28);
}

.neural-preset-button.active {
  border-color: rgba(180, 83, 9, 0.5);
  background: rgba(180, 83, 9, 0.08);
}

.neural-preset-label {
  font-weight: 800;
  color: var(--ink);
}

.neural-preset-note {
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.35;
}

.neural-layer-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
}

.neural-layer-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.38rem;
  min-height: 34px;
  padding: 0.38rem 0.58rem;
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 999px;
  background: #ffffff;
  color: var(--ink);
  font-size: 0.78rem;
  cursor: pointer;
}

.neural-layer-toggle input {
  width: 14px;
  height: 14px;
  accent-color: #0f766e;
}

.neural-score-list {
  display: grid;
  gap: 0.58rem;
}

.neural-score-row {
  display: grid;
  grid-template-columns: minmax(88px, 1fr) minmax(86px, 1.1fr) 44px;
  align-items: center;
  gap: 0.55rem;
  min-height: 34px;
}

.neural-score-row.is-top .neural-score-name {
  color: var(--class-color);
}

.neural-score-name {
  font-size: 0.84rem;
  font-weight: 700;
  color: var(--ink);
}

.neural-score-track {
  height: 9px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.08);
  overflow: hidden;
}

.neural-score-fill {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  transition: width 160ms ease;
}

.neural-score-row strong {
  font-family: var(--mono);
  font-size: 0.76rem;
  text-align: right;
  color: var(--ink);
}

.neural-report-card {
  display: grid;
  gap: 0.38rem;
  padding: 0.85rem 0.95rem;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(15, 23, 42, 0.03);
}

.neural-report-card.is-pass {
  border-color: rgba(15, 118, 110, 0.28);
  background: rgba(15, 118, 110, 0.08);
}

.neural-report-card.is-review {
  border-color: rgba(180, 83, 9, 0.28);
  background: rgba(180, 83, 9, 0.08);
}

.neural-report-status {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.neural-report-card p {
  color: var(--ink);
  font-size: 0.88rem;
  line-height: 1.45;
  margin: 0;
}

.neural-probe-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 0.72rem;
}

.neural-probe-card {
  display: grid;
  gap: 0.5rem;
  min-width: 0;
  padding: 0.78rem;
  border-radius: 14px;
  border: 1px solid rgba(15, 23, 42, 0.08);
  background: rgba(255, 255, 255, 0.78);
}

.neural-probe-card > span {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

.neural-mini-grid {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 1px;
  aspect-ratio: 1 / 1;
  width: 100%;
  overflow: hidden;
  border-radius: 8px;
  background: #e2e8f0;
}

.neural-mini-grid-5 { grid-template-columns: repeat(5, 1fr); }
.neural-mini-grid-3 { grid-template-columns: repeat(3, 1fr); }
.neural-mini-grid-2 { grid-template-columns: repeat(2, 1fr); }

.neural-mini-grid span {
  min-width: 0;
  min-height: 0;
}

.neural-calc-text {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.68rem;
  line-height: 1.45;
  margin: 0;
  overflow-wrap: anywhere;
}

/* ── Toggle pill refinements (widget-level) ─ */

.widget-toggle-button {
  padding: 0.42rem 0.9rem;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--ink);
  transition: background 160ms ease, border-color 160ms ease;
}

.widget-toggle-button:hover {
  background: color-mix(in srgb, var(--project-accent, var(--accent)) 10%, #ffffff);
}

.widget-toggle-button.active {
  background: var(--project-accent, var(--accent));
  color: white;
  border-color: transparent;
}

/* ── Duke V7 advanced widgets ─────────────── */

.widget-panel-nd2-agent-lab,
.widget-panel-survival-causal-lab,
.widget-panel-causal-companion-lab,
.widget-panel-timeline-pattern-lab,
.widget-panel-nlp-extraction-lab {
  background:
    linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.98)),
    radial-gradient(circle at 92% 8%, rgba(37, 99, 235, 0.12), transparent 30%);
}

.nd2-agent-grid,
.survival-lab-grid,
.causal-companion-grid,
.timeline-lab-grid,
.nlp-lab-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 1rem;
}

.nd2-preview-panel,
.nd2-stats-panel,
.nd2-export-panel,
.survival-curve-panel,
.survival-estimator-panel,
.causal-dag-panel,
.causal-assumption-panel,
.causal-code-panel,
.timeline-stage-panel,
.timeline-evidence-panel,
.nlp-note-panel,
.nlp-object-panel {
  border: 1px solid rgba(15, 23, 42, 0.08);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.07);
  padding: 1rem;
}

.nd2-agent-grid {
  grid-template-columns: 1fr 1fr 0.82fr;
}

.nd2-microscope {
  position: relative;
  min-height: 260px;
  border-radius: 22px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 62%),
    linear-gradient(145deg, #020617, #111827);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
}

.nd2-cell-field {
  position: absolute;
  inset: 1rem;
}

.nd2-cell {
  position: absolute;
  border-radius: 999px;
  animation: nd2CellPulse 1.9s ease-in-out infinite;
}

.nd2-scan-line {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--nd2-color), transparent);
  z-index: 2;
  animation: nd2Scan 2.8s ease-in-out infinite;
}

.nd2-threshold-input {
  width: 100%;
  accent-color: var(--nd2-color);
}

.nd2-threshold-meta {
  position: relative;
  display: flex;
  justify-content: space-between;
  margin-top: 0.35rem;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 0.68rem;
}

.nd2-group-list {
  display: grid;
  gap: 0.7rem;
}

.nd2-group-row {
  display: grid;
  grid-template-columns: 92px 1fr 42px;
  gap: 0.7rem;
  align-items: center;
  color: var(--muted);
  font-size: 0.82rem;
  animation: nd2BarRise 520ms ease both;
  animation-delay: var(--delay);
}

.nd2-group-track,
.survival-balance-track,
.survival-score-track,
.nlp-coverage,
.nlp-object-score {
  height: 9px;
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.08);
  overflow: hidden;
}

.nd2-group-track span,
.survival-balance-track span,
.survival-score-track span,
.nlp-coverage span,
.nlp-object-score span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), #2563eb);
}

.nd2-agent-status {
  display: grid;
  gap: 0.35rem;
  margin-bottom: 1rem;
}

.nd2-agent-status strong {
  font-size: 1.15rem;
}

.nd2-agent-status p,
.nd2-export-panel p,
.causal-code-panel p,
.timeline-evidence-panel p,
.nlp-note-panel p {
  color: var(--muted);
  line-height: 1.5;
}

.nd2-export-panel {
  display: grid;
  align-content: center;
  gap: 0.75rem;
  text-align: center;
}

.nd2-ring {
  --score: 72%;
  width: 118px;
  height: 118px;
  margin: 0 auto;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background:
    radial-gradient(circle at center, #ffffff 0 56%, transparent 57%),
    conic-gradient(var(--nd2-color) var(--score), rgba(15, 23, 42, 0.1) 0);
  box-shadow: 0 18px 36px rgba(15, 118, 110, 0.14);
  animation: nd2RingBreathe 2.6s ease-in-out infinite;
}

.nd2-ring span {
  font-family: var(--mono);
  font-size: 1.45rem;
  font-weight: 800;
}

.nd2-export-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.45rem;
}

.nd2-export-grid span {
  padding: 0.45rem;
  border-radius: 999px;
  background: rgba(15, 118, 110, 0.08);
  color: var(--accent);
  font-size: 0.74rem;
  font-weight: 800;
}

.survival-svg {
  width: 100%;
  min-height: 260px;
}

.survival-axis {
  stroke: rgba(15, 23, 42, 0.18);
  stroke-width: 1;
}

.survival-curve {
  fill: none;
  stroke-width: 3.4;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 160;
  stroke-dashoffset: 160;
  animation: drawSurvival 1.2s ease forwards;
}

.survival-treated {
  stroke: #0f766e;
}

.survival-control {
  stroke: #dc2626;
  animation-delay: 120ms;
}

.survival-svg text {
  fill: var(--muted);
  font-family: var(--mono);
  font-size: 0.22rem;
}

.survival-pulse {
  fill: #0f766e;
  animation: survivalPulse 1.6s ease-in-out infinite;
}

.survival-estimator-panel,
.survival-balance-card,
.survival-estimator-list,
.causal-assumption-panel,
.causal-code-panel,
.timeline-evidence-panel,
.nlp-note-panel,
.nlp-object-panel {
  display: grid;
  gap: 0.8rem;
}

.survival-balance-card strong,
.timeline-score-card strong {
  font-family: var(--mono);
  font-size: 1.8rem;
  color: var(--accent);
}

.survival-estimator-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.5rem;
  align-items: center;
  padding: 0.7rem;
  border-radius: 16px;
  background: #f8fafc;
}

.survival-estimator-row small {
  display: block;
  color: var(--muted);
  text-align: right;
}

.survival-score-track {
  grid-column: 1 / -1;
}

.causal-companion-grid {
  grid-template-columns: 1fr 0.9fr 1fr;
}

.causal-node-map {
  position: relative;
  min-height: 230px;
  border-radius: 18px;
  background: linear-gradient(145deg, #f8fafc, #eef6ff);
  overflow: hidden;
}

.causal-node {
  position: absolute;
  display: inline-grid;
  place-items: center;
  min-width: 96px;
  min-height: 42px;
  padding: 0.55rem;
  border-radius: 999px;
  background: #ffffff;
  color: var(--ink);
  font-weight: 800;
  box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
  z-index: 2;
}

.causal-node-0 { left: 8%; top: 42%; }
.causal-node-1 { left: 38%; top: 12%; }
.causal-node-2 { right: 8%; top: 42%; }
.causal-node-3 { left: 42%; bottom: 12%; }

.causal-edge {
  position: absolute;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(15, 118, 110, 0.15), rgba(15, 118, 110, 0.85));
  transform-origin: left center;
  animation: causalEdgeFlow 1.8s ease-in-out infinite;
}

.causal-edge-a { left: 25%; top: 43%; width: 42%; transform: rotate(-26deg); }
.causal-edge-b { left: 26%; top: 56%; width: 42%; transform: rotate(22deg); animation-delay: 180ms; }
.causal-edge-c { left: 47%; top: 31%; width: 32%; transform: rotate(38deg); animation-delay: 320ms; }

.causal-assumption-panel ul,
.timeline-evidence-panel ul {
  padding-left: 1.15rem;
  color: var(--muted);
  line-height: 1.55;
}

.causal-code-panel code {
  display: block;
  padding: 0.9rem;
  border-radius: 16px;
  background: #0f172a;
  color: #d1fae5;
  white-space: normal;
  line-height: 1.5;
}

.timeline-lab-grid {
  grid-template-columns: 1.15fr 0.85fr;
}

.timeline-rail-animated {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.8rem;
  min-height: 260px;
  align-items: end;
  padding: 1rem;
  border-radius: 18px;
  background: linear-gradient(145deg, #0f172a, #134e4a);
}

.timeline-phase {
  display: grid;
  gap: 0.55rem;
  align-items: end;
  min-height: 220px;
  color: #ffffff;
}

.timeline-phase-bar {
  display: block;
  height: var(--height);
  min-height: 32px;
  border-radius: 999px 999px 10px 10px;
  background: linear-gradient(180deg, #facc15, #14b8a6);
  box-shadow: 0 0 24px rgba(20, 184, 166, 0.34);
  animation: timelineBarGrow 780ms ease both;
  animation-delay: var(--delay);
}

.timeline-phase strong {
  font-size: 0.75rem;
  line-height: 1.2;
}

.timeline-score-card {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: center;
  padding: 0.8rem;
  border-radius: 16px;
  background: rgba(15, 118, 110, 0.08);
}

.nlp-lab-grid {
  grid-template-columns: 0.9fr 1.1fr;
}

.nlp-note-panel p {
  padding: 0.9rem;
  border-radius: 16px;
  background: #f8fafc;
  color: var(--ink);
}

.nlp-object-panel {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.nlp-object-card {
  display: grid;
  gap: 0.4rem;
  padding: 0.8rem;
  border-radius: 16px;
  background: #ffffff;
  box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
  animation: nlpCardFloat 680ms ease both;
}

.nlp-object-card span,
.nlp-object-card small,
.nlp-note-panel small {
  color: var(--muted);
  font-size: 0.75rem;
}

@keyframes nd2Scan {
  0%, 100% { transform: translateY(0); opacity: 0.35; }
  50% { transform: translateY(258px); opacity: 0.95; }
}

@keyframes nd2CellPulse {
  0%, 100% { transform: scale(0.88); filter: blur(0); }
  50% { transform: scale(1.08); filter: blur(0.3px); }
}

@keyframes nd2BarRise {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes nd2RingBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.035); }
}

@keyframes drawSurvival {
  to { stroke-dashoffset: 0; }
}

@keyframes survivalPulse {
  0%, 100% { transform: scale(1); opacity: 0.78; }
  50% { transform: scale(1.6); opacity: 0.28; }
}

@keyframes causalEdgeFlow {
  0%, 100% { opacity: 0.45; }
  50% { opacity: 1; }
}

@keyframes timelineBarGrow {
  from { transform: scaleY(0.18); opacity: 0.4; }
  to { transform: scaleY(1); opacity: 1; }
}

@keyframes nlpCardFloat {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════════
   WIDGET RESPONSIVE NORMALIZATION
   When the page-inner gets narrow (zoom, narrow window),
   multi-column widget shells collapse so their content
   stays legible instead of squishing into thin strips.
   ══════════════════════════════════════════════ */

@media (max-width: 1280px) {
  /* Multi-column widget shells -> single column */
  .neural-workbench,
  .market-lab-shell,
  .policy-lab-grid,
  .nd2-agent-grid,
  .survival-lab-grid,
  .causal-companion-grid,
  .checkdemo-aaron-grid,
  .aaron-flow-map {
    grid-template-columns: minmax(0, 1fr) !important;
  }

  .aaron-flow-arrow {
    display: none;
  }

  /* Five-column CNN probe strip -> wrapping auto-fit */
  .neural-probe-grid {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) !important;
  }

  /* Horizontal multi-step flows -> wrap and drop inline arrows */
  .market-flow-map,
  .research-control-flow {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) !important;
    row-gap: 0.75rem;
  }

  /* Tall scene canvas should not exceed its width once stacked */
  .neural-scene-canvas {
    height: clamp(260px, 60vw, 360px);
  }

  /* Algorithm 3-card grid -> stack so cards keep readable width */
  .algorithm-card-grid {
    grid-template-columns: minmax(0, 1fr) !important;
  }
}

@media (max-width: 960px) {
  .neural-probe-grid {
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) !important;
  }
}

<script>
(function () {
  const ns = window.aiResume || (window.aiResume = {});

  function create(data) {
    var activeStageByProject = {};
    var policyScenarioByProject = {};

        nd2ThresholdByProject[project.id] = typeof w.defaultThreshold === "number" ? w.defaultThreshold : (w.min || 0);
      }

      if (w.type === "survival-causal-lab") {
        survivalCohortByProject[project.id] = w.defaultCohort || (w.cohorts && w.cohorts[0] && w.cohorts[0].id);
      }

      if (w.type === "causal-companion-lab") {
        causalConceptByProject[project.id] = w.defaultConcept || (w.concepts && w.concepts[0] && w.concepts[0].id);
      }

      if (w.type === "timeline-pattern-lab") {
        timelinePatternByProject[project.id] = w.defaultPattern || (w.patterns && w.patterns[0] && w.patterns[0].id);
      }

      if (w.type === "nlp-extraction-lab") {
        nlpSampleByProject[project.id] = w.defaultSample || (w.samples && w.samples[0] && w.samples[0].id);
      }

      if (w.type === "threshold-dials") {
        thresholdByProject[project.id] = typeof w.value === "number" ? w.value : w.min;

    return new Set(pTech.concat(eTech));

      '<div class="vip-endorsement-body">' +
        '<p class="vip-endorsement-eyebrow">' + eyebrow + '</p>' +

      endorsement.institution ||
      endorsement.organization ||
      endorsement.role ||

    positions[i * 3] = (Math.random() - 0.5) * 80;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 80;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
    velocities.push({
      x: (Math.random() - 0.5) * 0.006,
      y: (Math.random() - 0.5) * 0.006,
      z: (Math.random() - 0.5) * 0.003
    });
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x4f46e5,
    size: 0.1,
    transparent: true,
    opacity: 0.22,
    sizeAttenuation: true
  });

  const particles = new THREE.Points(geometry, material);
  scene.add(particles);

  /* Soft connecting lines between nearby particles */
  const lineCount = 48;
  const linePositions = new Float32Array(lineCount * 6);
  const lineGeometry = new THREE.BufferGeometry();
  lineGeometry.setAttribute("position", new THREE.BufferAttribute(linePositions, 3));
  const lineMaterial = new THREE.LineBasicMaterial({
    color: 0x7c3aed,
    transparent: true,
    opacity: 0.045
  });
  const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
  scene.add(lines);

  /* Mouse influence */
  let mouseX = 0;
  let mouseY = 0;
  document.addEventListener("mousemove", function (e) {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  /* Scroll-based camera tilt */
  let scrollProgress = 0;
  ns.setScrollProgress = function (value) {
    scrollProgress = value;
  };

  function updateLines() {
    const pos = geometry.attributes.position.array;
    let idx = 0;
    const maxDist = 6.5;

    for (let i = 0; i < COUNT && idx < lineCount * 6; i++) {
      for (let j = i + 1; j < COUNT && idx < lineCount * 6; j++) {
        const dx = pos[i * 3] - pos[j * 3];
        const dy = pos[i * 3 + 1] - pos[j * 3 + 1];
        const dz = pos[i * 3 + 2] - pos[j * 3 + 2];
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < maxDist) {
          linePositions[idx++] = pos[i * 3];
          linePositions[idx++] = pos[i * 3 + 1];
          linePositions[idx++] = pos[i * 3 + 2];
          linePositions[idx++] = pos[j * 3];
          linePositions[idx++] = pos[j * 3 + 1];
          linePositions[idx++] = pos[j * 3 + 2];
        }
      }
    }

    /* Zero out unused */
    for (let k = idx; k < lineCount * 6; k++) {
      linePositions[k] = 0;
    }

    lineGeometry.attributes.position.needsUpdate = true;
  }

  function animate() {
    requestAnimationFrame(animate);

    const pos = geometry.attributes.position.array;
    for (let i = 0; i < COUNT; i++) {
      pos[i * 3] += velocities[i].x;
      pos[i * 3 + 1] += velocities[i].y;
      pos[i * 3 + 2] += velocities[i].z;

      /* Wrap around */
      if (pos[i * 3] > 40) pos[i * 3] = -40;
      if (pos[i * 3] < -40) pos[i * 3] = 40;
      if (pos[i * 3 + 1] > 40) pos[i * 3 + 1] = -40;
      if (pos[i * 3 + 1] < -40) pos[i * 3 + 1] = 40;
    }

    geometry.attributes.position.needsUpdate = true;
    updateLines();

    /* Camera subtle movement */
    camera.position.x += (mouseX * 0.7 - camera.position.x) * 0.015;
    camera.position.y += (-mouseY * 0.7 - camera.position.y) * 0.015;
    camera.rotation.z = scrollProgress * 0.008;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener("resize", function () {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  ns.threeBg = { scene, camera };
})();

</script>
<script>
(function () {
  const ns = window.aiResume || (window.aiResume = {});

  /* ── Page 1: Hero ──────────────────────────── */

  function renderPage1(data) {
    var ui = data.ui || {};

    renderHeroIdentity(data);
    document.getElementById("results-title").textContent = ui.resultsTitle || "Featured AI Projects";
    document.getElementById("experience-title").textContent = ui.experienceTitle || "Experience";
    document.getElementById("projects-title").textContent = ui.projectsTitle || "Selected AI Projects";
    document.getElementById("education-title").textContent = ui.educationTitle || "Education";
    document.getElementById("awards-title").textContent = ui.awardsTitle || "Awards";
    document.getElementById("publications-title").textContent = ui.publicationsTitle || "Publications";
    document.getElementById("coursework-title").textContent = ui.courseworkTitle || "Relevant Coursework & Applied Projects";
    document.getElementById("profile-materials-title").textContent = ui.profileMaterialsTitle || "Profile Materials";

    document.getElementById("hero-contact").innerHTML = buildContactMarkup(data);
    renderSelectedResults(data);
  }

  function renderSelectedResults(data) {
    var grid = document.getElementById("results-grid");
    if (!grid) return;

    var projects = getSelectedResultProjects(data);
    grid.innerHTML = projects.map(function (project) {
      var proof = renderResultEndorsementBadge(project, "proof");
      return '<article class="result-project-card" style="--project-accent:' + (project.accent || "#4f46e5") + '">' +
        '<div class="result-project-top">' +
          '<div class="result-project-skill-wrap">' + renderProjectSkillStrip(data, project, 6, { hideOverflow: true }) + '</div>' +
          proof +
        '</div>' +
        '<div class="result-project-main">' +
          '<h3>' + (project.navTitle || project.title) + '</h3>' +
          '<p class="result-project-meta">' + (project.navMeta || project.source || "Project") + '</p>' +
          '<p class="result-project-summary">' + summarizeText(project.summary || project.algorithmSummary || "", 180) + '</p>' +
        '</div>' +
        '<div class="result-project-footer">' +
          '<button class="result-demo-button" type="button" data-result-project="' + project.id + '">Check demo</button>' +
        '</div>' +
      '</article>';
    }).join("");

    grid.querySelectorAll("[data-result-project]").forEach(function (button) {
      button.addEventListener("click", function () {
        openProjectFromResult(button.dataset.resultProject);
      });
    });
  }

  function renderResultEndorsementBadge(project, placement) {
    var endorsement = project && project.endorsement;
    if (!endorsement) return "";

    var source = endorsement.company || endorsement.institution || endorsement.organization || endorsement.role || "Expert";
    var person = endorsement.by || endorsement.name || "";
    var isProof = placement === "proof";
    var className = "result-endorsement-badge" + (placement === "proof" ? " result-endorsement-proof" : "");
    var copy = isProof
      ? '<strong>Expert endorsement</strong>' +
        '<span class="result-endorsement-person">' + escapeHtml(stripTags(person || source)) + '</span>' +
        (person && source ? '<span class="result-endorsement-source">' + escapeHtml(compactEndorsementSource(source)) + '</span>' : "")
      : '<strong>Expert endorsement</strong>' +
        '<span>' + escapeHtml(stripTags(person ? person + " · " + source : source)) + '</span>';

    return '<div class="' + className + '" aria-label="Expert endorsement">' +
      renderResultEndorsementLogo(endorsement) +
      '<span class="result-endorsement-badge-copy">' +
        copy +
      '</span>' +
    '</div>';
  }

  function compactEndorsementSource(value) {
    return stripTags(value)
      .replace(/\bCapital Management\b/g, "Capital Mgmt")
      .replace(/\bGuideStone Capital Mgmt\b/g, "GuideStone CM")
      .replace(/\bManagement\b/g, "Mgmt")
      .replace(/\bUniversity\b/g, "Univ.")
      .replace(/\bMinnesota\b/g, "MN")
      .trim();
  }

  function renderResultEndorsementLogo(endorsement) {
    if (endorsement.logoSrc) {
      return '<span class="result-endorsement-logo">' +
        '<img src="' + endorsement.logoSrc + '" alt="' + (resultEndorsementLogoAlt(endorsement)) + '" loading="lazy" onerror="this.remove();this.parentElement.classList.add(\'is-placeholder\');">' +
        '<span class="result-endorsement-logo-fallback">' + resultEndorsementLogoText(endorsement) + '</span>' +
      '</span>';
    }

    return '<span class="result-endorsement-logo is-placeholder" aria-hidden="true">' +
      '<span class="result-endorsement-logo-fallback">' + resultEndorsementLogoText(endorsement) + '</span>' +
    '</span>';
  }

  function resultEndorsementLogoAlt(endorsement) {
    return stripTags(endorsement.logoAlt || endorsement.company || endorsement.institution || endorsement.organization || "Company logo");
  }

  function resultEndorsementLogoText(endorsement) {
    var source = endorsement.logoText || endorsement.company || endorsement.institution || endorsement.organization || endorsement.by || "Expert";
    var words = stripTags(source).split(/\s+/).filter(Boolean);
    if (!words.length) return "EX";
    if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
    return (words[0][0] + words[1][0]).toUpperCase();
  }

  function getSelectedResultProjects(data) {
    var projects = data.projects || [];
    var seen = {};
    var ordered = projects.filter(function (project) {
      return project.endorsement;
    }).concat(projects).filter(function (project) {
      if (!project || seen[project.id]) return false;
      seen[project.id] = true;
      return true;
    });
    return ordered.slice(0, 2);
  }

  function renderProjectSkillStrip(data, project, limit, options) {
    if (!ns.skills || !ns.skills.getProjectSkillItems || !ns.skills.renderSkillPills) return "";
    return ns.skills.renderSkillPills(
      ns.skills.getProjectSkillItems(data, project),
      Object.assign({ limit: limit || 5 }, options || {})
    );
  }

  function summarizeText(value, maxLength) {
    var text = stripTags(value).replace(/\s+/g, " ").trim();
    if (!text) return "";
    if (text.length <= maxLength) return text;
    return text.slice(0, maxLength - 1).replace(/\s+\S*$/, "") + "...";
  }

  function openProjectFromResult(projectId) {
    var item = document.querySelector('.project-accordion-item[data-project-id="' + projectId + '"]');
    if (!item) {
      var page = document.getElementById("page-3");
      if (page) page.scrollIntoView({ behavior: "smooth", block: "start" });
      return;
    }
    var header = item.querySelector(".project-accordion-header");
    if (header && !item.classList.contains("is-expanded")) header.click();
    settleScrollToProject(item);
  }

  function settleScrollToProject(item) {
    if (!item) return;
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(function () {
        item.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }

  function renderHeroIdentity(data) {
    var p = data.profile || {};
    var identity = document.querySelector(".hero-identity");
    var role = p.targetRole || data.targetRole || (data.directory && data.directory.role) || "";
    var summary = p.summaryHtml || p.summary || "";
    var initials = getInitials(p.shortName || p.name || "");
    var photo = getProfilePhoto(data);

    if (!identity) {
      document.getElementById("hero-name").textContent = p.name || "";
      document.getElementById("hero-summary").innerHTML = summary;
      attachHeroSummaryToggle(document.getElementById("hero-summary"));
      document.getElementById("hero-contact").innerHTML = buildContactMarkup(data);
      return;
    }

    identity.innerHTML = '<article class="linkedin-profile-card">' +
      '<div class="linkedin-cover" aria-hidden="true">' +
        '<span>Vibe ID</span>' +
      '</div>' +
      '<div class="linkedin-profile-body">' +
        '<div class="linkedin-avatar-row">' +
          '<div class="linkedin-avatar" aria-hidden="true">' +
            (photo ? '<img src="' + photo + '" alt="" onerror="this.remove(); this.parentElement.classList.remove(\'has-photo\');">' : "") +
            '<span>' + initials + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="hero-text">' +
          '<div class="hero-title-row">' +
            '<h1 id="hero-name">' + (p.name || "") + '</h1>' +
          '</div>' +
          (role ? '<p class="hero-headline">' + role + '</p>' : "") +
          '<p class="hero-summary" id="hero-summary">' + summary + '</p>' +
          '<div class="hero-contact" id="hero-contact">' + buildContactMarkup(data) + '</div>' +
        '</div>' +
      '</div>' +
    '</article>';

    attachHeroSummaryToggle(document.getElementById("hero-summary"));
  }

  function attachHeroSummaryToggle(summaryEl) {
    if (!summaryEl || summaryEl.dataset.toggleBound === "1") return;

    function evaluate() {
      summaryEl.classList.remove("is-expanded");
      var truncated = summaryEl.scrollHeight - summaryEl.clientHeight > 1;
      var existingToggle = summaryEl.parentElement && summaryEl.parentElement.querySelector(".hero-summary-toggle");

      if (!truncated) {
        if (existingToggle) existingToggle.remove();
        return;
      }

      if (existingToggle) return;

      var toggle = document.createElement("button");
      toggle.type = "button";
      toggle.className = "hero-summary-toggle";
      toggle.setAttribute("aria-expanded", "false");
      toggle.textContent = "Read more";
      toggle.addEventListener("click", function () {
        var expanded = summaryEl.classList.toggle("is-expanded");
        toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
        toggle.textContent = expanded ? "Show less" : "Read more";
      });
      summaryEl.insertAdjacentElement("afterend", toggle);
    }

    summaryEl.dataset.toggleBound = "1";
    evaluate();
    window.addEventListener("resize", function () { window.requestAnimationFrame(evaluate); });
  }

  function getInitials(name) {
    var parts = String(name || "").replace(/\([^)]*\)/g, " ").trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "AI";
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function getProfilePhoto(data) {
    var p = data.profile || {};
    if (p.photo || p.image || p.headshot) return p.photo || p.image || p.headshot;
    if (data.id === "aaron-li") return "../User_data/Aaron Li/1775700440236.jpg";
    return "";
  }

  function buildContactMarkup(data) {
    var p = data.profile || {};
    var items = [];

    if (p.location) {
      items.push('<span>' + p.location + '</span>');
    }

    if (p.phone) {
      items.push('<span>' + p.phone + '</span>');
    }

    if (Array.isArray(data.links) && data.links.length) {
      data.links.forEach(function (link) {
        if (!link || !link.href || !link.value) return;
        items.push('<a href="' + link.href + '" target="_blank" rel="noreferrer">' + link.value + '</a>');
      });
      return items.join("");
    }

    if (p.email) {
      items.push('<a href="mailto:' + p.email + '">' + p.email + '</a>');
    }

    if (p.website) {
      items.push('<a href="' + p.website + '" target="_blank" rel="noreferrer">Website</a>');
    }

    if (p.github) {
      items.push('<a href="' + p.github + '" target="_blank" rel="noreferrer">GitHub</a>');
    }

    if (p.linkedin) {
      items.push('<a href="' + p.linkedin + '" target="_blank" rel="noreferrer">LinkedIn</a>');
    }

    if (p.scholar) {
      items.push('<a href="' + p.scholar + '" target="_blank" rel="noreferrer">Google Scholar</a>');
    }

    return items.join("");
  }

  /* ── Page 3: Experience ────────────────────── */

  function renderExperience(data, callbacks) {
    var container = document.getElementById("experience-list");
    var experiences = ns.skills && ns.skills.getFilteredExperience
      ? ns.skills.getFilteredExperience(data, window.aiResumeState || {})
      : data.experience;

    if (!experiences.length) {
      container.innerHTML = '<div class="filter-empty-state">' +
        '<h3>No experiences match the selected skills.</h3>' +
        '<p>Clear one filter or choose a broader skill combination.</p>' +
      '</div>';
      return;
    }

    container.innerHTML = experiences
      .map(function (item, index) {
        var expId = item.id || getExperienceId(data, item, index);
        var endorsement = ns.modes && ns.modes.renderVipEndorsement
          ? ns.modes.renderVipEndorsement(item.endorsement, {
              eyebrow: "Endorsement",
              variant: "experience"
            })
          : "";
        return '<article class="experience-item" data-exp-id="' + expId + '">' +
          '<div class="experience-head">' +
            '<div class="experience-title-row">' +
              renderOrgLogo(item.organization, item.location) +
              '<div>' +
                '<h3>' + item.role + '</h3>' +
                '<p class="experience-org">' + item.organization + (item.location ? " \u00b7 " + item.location : "") + '</p>' +
              '</div>' +
            '</div>' +
            '<p class="experience-dates">' + item.dates + '</p>' +
          '</div>' +
          renderExperiencePreview(item) +
          renderExperienceKeywordRail(data, item, expId) +
          renderExperienceDrawer(data, item, expId) +
          renderExperienceProofBlock(data, item, expId) +
          endorsement +
        '</article>';
      })
      .join("");

    function animateExperienceState(item, mode) {
      if (typeof gsap === "undefined" || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        return;
      }

      if (mode === "hover") {
        gsap.to(item, {
          y: -5,
          scale: 1.006,
          duration: 0.42,
          ease: "power3.out"
        });
        return;
      }

      if (mode === "active") {
        gsap.to(item, {
          y: -4,
          scale: 1.01,
          duration: 0.58,
          ease: "back.out(1.3)"
        });
        return;
      }

      gsap.to(item, {
        y: 0,
        scale: 1,
        duration: 0.5,
        ease: "expo.out"
      });
    }

    // Bind interaction events
    container.querySelectorAll(".experience-item").forEach(function(item) {
      item.addEventListener("mouseenter", function() {
        if (!item.classList.contains("is-active")) {
          animateExperienceState(item, "hover");
        }
        if (callbacks && callbacks.onExperienceHover) callbacks.onExperienceHover(item.dataset.expId);
      });
      item.addEventListener("mouseleave", function() {
        if (!item.classList.contains("is-active")) {
          animateExperienceState(item, "rest");
        }
        if (callbacks && callbacks.onExperienceLeave) callbacks.onExperienceLeave();
      });
      item.addEventListener("click", function() {
        var expId = item.dataset.expId;
        var isActive = item.classList.contains("is-active");

        container.querySelectorAll(".experience-item").forEach(function(el) {
          el.classList.remove("is-active");
          if (el !== item) {
            animateExperienceState(el, "rest");
          }
        });

        if (!isActive) {
          item.classList.add("is-active");
          animateExperienceState(item, "active");
          if (callbacks && callbacks.onExperienceActivate) callbacks.onExperienceActivate(expId);
        } else {
          animateExperienceState(item, "rest");
          if (callbacks && callbacks.onExperienceDeactivate) callbacks.onExperienceDeactivate();
        }
      });
    });

    container.querySelectorAll(".experience-detail-drawer").forEach(function (drawer) {
      drawer.addEventListener("click", function (event) {
        event.stopPropagation();
      });

      var summary = drawer.querySelector("summary");
      var item = drawer.closest(".experience-item");
      if (!summary || !item) return;

      summary.addEventListener("click", function (event) {
        event.preventDefault();
        event.stopPropagation();
        toggleExperienceDrawer(item, drawer);
      });
    });
  }

  function getExperienceId(data, item, fallbackIndex) {
    var index = (data.experience || []).indexOf(item);
    return "exp-" + (index === -1 ? fallbackIndex : index);
  }

  function renderOrgLogo(name, meta) {
    if (ns.icons && ns.icons.renderOrgLogo) {
      return ns.icons.renderOrgLogo(name, meta);
    }
    return '<span class="org-logo is-placeholder"><span>' + getInitials(name || "Organization") + '</span></span>';
  }

  function renderExperiencePreview(item) {
    var first = Array.isArray(item.bullets) && item.bullets.length ? item.bullets[0] : "";
    if (!first) return "";
    return '<ul class="experience-preview-list">' +
      '<li>' + first + '</li>' +
    '</ul>';
  }

  function renderExperienceKeywordRail(data, item, expId) {
    var bullets = getHiddenBulletModels(data, item);
    if (!bullets.length) return "";

    return '<div class="experience-keyword-rail" aria-label="Hidden bullet keywords">' +
      bullets.map(function (bullet, index) {
        return '<span class="exp-keyword-token" data-exp-keyword="' + expId + '" data-keyword-index="' + index + '">' + bullet.keyword + '</span>';
      }).join("") +
    '</div>';
  }

  function renderExperienceDrawer(data, item, expId) {
    var bullets = getHiddenBulletModels(data, item);
    if (!bullets.length) return "";

    return '<details class="experience-detail-drawer" data-exp-drawer="' + expId + '">' +
      '<summary>Read more</summary>' +
      '<ul class="compact-list experience-extra-list">' +
        bullets.map(function (bullet, index) {
          return '<li>' + renderExpandedBulletText(bullet, expId, index) + '</li>';
        }).join("") +
      '</ul>' +
    '</details>';
  }

  function getHiddenBulletModels(data, item) {
    var bullets = Array.isArray(item.bullets) ? item.bullets.slice(1) : [];
    return bullets.map(function (bullet, index) {
      var model = extractBulletKeyword(data, bullet, index, item);
      return {
        text: stripTags(bullet),
        keyword: model.keyword,
        matchText: model.matchText,
        index: index,
        score: ns.skills && ns.skills.scoreTextForJob
          ? ns.skills.scoreTextForJob(data, model.keyword + " " + stripTags(bullet))
          : 0
      };
    }).sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return a.index - b.index;
    });
  }

  function extractBulletKeyword(data, value, fallbackIndex, item) {
    var html = String(value || "");
    var plain = stripTags(html);
    var configured = getConfiguredReadMoreKeyword(item, fallbackIndex);
    var candidates = [];

    if (configured) {
      var configuredLabel = typeof configured === "object"
        ? (configured.keyword || configured.label || configured.text || "")
        : configured;
      var configuredMatchText = typeof configured === "object"
        ? (configured.matchText || configured.match || configuredLabel)
        : configuredLabel;
      var formatted = typeof configured === "object"
        ? configuredLabel
        : formatReadMoreKeywordLabel(configuredLabel);
      if (formatted) {
        return {
          keyword: formatted,
          matchText: findBestMatchText(plain, configuredMatchText) || findBestMatchText(plain, formatted) || findBestMatchText(plain, configuredLabel)
        };
      }
    }

    var matches = ns.skills && ns.skills.getJobKeywordMatches
      ? ns.skills.getJobKeywordMatches(data, html)
      : [];
    matches.forEach(function (label, index) {
      addKeywordCandidate(candidates, label, findBestMatchText(plain, label), 1120 - index * 18, "jd");
    });

    getSkillKeywordLabels(data, item).forEach(function (label) {
      addKeywordCandidate(candidates, label, findBestMatchText(plain, label), 860, "skill");
    });

    getStrongPhrases(html).forEach(function (label) {
      addKeywordCandidate(candidates, label, findBestMatchText(plain, label), 760, "strong");
    });

    getMetricPhrases(plain).forEach(function (label) {
      addKeywordCandidate(candidates, label, findBestMatchText(plain, label), 690, "metric");
    });

    getSignalPhrases(plain).forEach(function (label) {
      addKeywordCandidate(candidates, label, findBestMatchText(plain, label), 540, "signal");
    });

    var selected = selectReadMoreKeywords(candidates);
    if (selected.length) {
      return {
        keyword: selected.map(function (candidate) { return candidate.label; }).join(" + "),
        matchText: selected[0].matchText || selected[0].raw
      };
    }

    return {
      keyword: "Signal" + (fallbackIndex + 1),
      matchText: ""
    };
  }

  function getConfiguredReadMoreKeyword(item, fallbackIndex) {
    var values = item && (item.readMoreKeywords || item.readMoreKeyword);
    if (!values) return "";
    if (!Array.isArray(values)) return values;
    var direct = values[fallbackIndex];
    if (typeof direct === "string") return direct;
    if (direct && typeof direct === "object") return direct;
    return "";
  }

  function formatReadMoreKeywordLabel(value) {
    var labels = [];
    splitReadMoreKeywordParts(value).forEach(function (part) {
      var cleaned = cleanKeywordPhrase(part);
      if (!cleaned || isWeakKeyword(cleaned)) return;
      var label = polishKeywordLabel(cleaned);
      if (!label) return;
      var normalized = normalizeKeywordComparable(label);
      if (!normalized || labels.some(function (existing) { return normalizeKeywordComparable(existing) === normalized || areKeywordLabelsRedundant(existing, label); })) return;
      labels.push(label);
    });
    return labels.slice(0, 2).join(" + ");
  }

  function splitReadMoreKeywordParts(value) {
    return String(value || "")
      .replace(/[.…]+/g, " ")
      .replace(/\s+\+\s+/g, " | ")
      .replace(/\s+\/\s+/g, " | ")
      .replace(/\s*,\s*/g, " | ")
      .replace(/\s*;\s*/g, " | ")
      .replace(/\s+\band\b\s+/gi, " | ")
      .split("|")
      .map(function (part) { return part.replace(/\s+/g, " ").trim(); })
      .filter(Boolean);
  }

  function addKeywordCandidate(candidates, value, matchText, score, source) {
    var raw = stripTags(value || "").replace(/\s+/g, " ").trim();
    if (!raw) return;

    var cleaned = cleanKeywordPhrase(raw);
    if (!cleaned || isWeakKeyword(cleaned)) return;

    var normalized = normalizeKeywordComparable(cleaned);
    if (!normalized || normalized.length < 3) return;

    var existing = candidates.filter(function (candidate) {
      return candidate.normalized === normalized;
    })[0];
    var candidate = {
      raw: cleaned,
      label: polishKeywordLabel(cleaned),
      matchText: matchText || cleaned,
      normalized: normalized,
      score: score + scoreKeywordPhrase(cleaned),
      source: source
    };

    if (!existing) {
      candidates.push(candidate);
    } else if (candidate.score > existing.score) {
      existing.raw = candidate.raw;
      existing.label = candidate.label;
      existing.matchText = candidate.matchText;
      existing.score = candidate.score;
      existing.source = candidate.source;
    }
  }

  function selectReadMoreKeywords(candidates) {
    var ranked = candidates.filter(function (candidate) {
      return candidate && candidate.label;
    }).sort(function (a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return b.raw.length - a.raw.length;
    });

    if (!ranked.length) return [];
    var selected = [ranked[0]];

    for (var i = 1; i < ranked.length; i += 1) {
      if (selected.length >= 2 || selectedConceptCount(selected) >= 2) break;
      if (areKeywordsRedundant(selected[0], ranked[i])) continue;
      if (ranked[i].score < Math.max(520, selected[0].score * 0.58)) continue;
      selected.push(ranked[i]);
    }

    return selected;
  }

  function selectedConceptCount(selected) {
    return splitReadMoreKeywordParts(selected.map(function (candidate) {
      return candidate.label || candidate.raw || "";
    }).join(" + ")).length;
  }

  function getSkillKeywordLabels(data, item) {
    var labels = [];
    var related = {};

    (item && item.relatedTech || []).forEach(function (id) { related[id] = true; });
    (data.stack || []).forEach(function (skill) {
      if (related[skill.id] || related[skill.label]) labels.push(skill.label || skill.id);
    });
    (data.quantToolkit || []).forEach(function (tool) {
      labels.push(tool.label);
    });

    return labels.filter(Boolean);
  }

  function getStrongPhrases(html) {
    var out = [];
    var pattern = /<strong[^>]*>(.*?)<\/strong>/gi;
    var match;
    while ((match = pattern.exec(String(html || "")))) {
      var text = stripTags(match[1]);
      if (text) out.push(text);
      var compact = compactStrongPhrase(text);
      if (compact && compact !== text) out.push(compact);
    }
    return out;
  }

  function compactStrongPhrase(value) {
    var words = stripTags(value).split(/\s+/).filter(Boolean);
    if (words.length <= 3) return words.join(" ");
    var filtered = words.filter(function (word) {
      return !isWeakKeyword(word);
    });
    if (filtered.length >= 2) return filtered.slice(-3).join(" ");
    return words.slice(-3).join(" ");
  }

  function getMetricPhrases(text) {
    var out = [];
    var source = String(text || "");
    var pattern = /(?:under\s+)?[$]?\d[\d,./-]*(?:\.\d+)?\+?%?(?:\/\d+(?:\.\d+)?)?(?:\s*(?:years?|months?|mo|samples?|views?|registrations?|accuracy|CPM|CTR|GPA|channels?|events?|features?|patients?|documents?|hours?))?/gi;
    var match;
    while ((match = pattern.exec(source))) {
      var raw = match[0].trim();
      if (!raw || /^\d$/.test(raw)) continue;
      var after = source.slice(match.index + match[0].length).match(/^\s+(accuracy|samples?|views?|registrations?|channels?|events?|features?|patients?|documents?|labor|CPM|CTR|GPA)\b/i);
      out.push(after ? raw + " " + after[1] : raw);
    }
    return out;
  }

  function getSignalPhrases(text) {
    var out = [];
    var source = String(text || "");
    var pattern = /\b(?:[A-Z][A-Za-z0-9+.#-]*|[A-Z]{2,}|[A-Za-z]+(?:[-/][A-Za-z0-9+.#]+)+)(?:\s+(?:[A-Z][A-Za-z0-9+.#-]*|[A-Z]{2,}|[a-z][A-Za-z0-9+.#-]{2,})){0,2}\b/g;
    var match;
    while ((match = pattern.exec(source))) {
      var phrase = match[0].trim();
      if (phrase) out.push(phrase);
    }
    return out;
  }

  function cleanKeywordPhrase(value) {
    var text = String(value || "")
      .replace(/[.…]+/g, " ")
      .replace(/[()[\]{}"“”‘’]/g, " ")
      .replace(/\s*[;:,.]\s*$/g, "")
      .replace(/\b(?:such as|including|using|through|across)\b\s*/gi, "")
      .replace(/\s+/g, " ")
      .trim();
    var words = text.split(/\s+/).filter(Boolean);

    while (words.length && isWeakKeyword(words[0])) words.shift();
    while (words.length && isWeakKeyword(words[words.length - 1])) words.pop();
    if (!words.length) return "";

    if (words.length > 4) words = words.slice(-4);
    return words.join(" ");
  }

  function scoreKeywordPhrase(value) {
    var text = String(value || "");
    var score = 0;
    if (/\d/.test(text)) score += 120;
    if (/[A-Z]{2,}/.test(text)) score += 90;
    if (/\b(AI|LLM|SQL|Python|R|SAS|Excel|GTM|KPI|DCF|M&A|NLP|CNN|U-Net|FastAPI|React|Tableau|Power BI)\b/i.test(text)) score += 110;
    if (/\b(model|analytics|measurement|strategy|research|pipeline|valuation|segmentation|survival|causal|stakeholder|experiment|attribution|forecast|dashboard|collaboration|recommendation|classification)\b/i.test(text)) score += 70;
    return score;
  }

  function isWeakKeyword(value) {
    var text = String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
    var stop = {
      a: true, an: true, and: true, the: true, for: true, with: true, from: true,
      into: true, using: true, across: true, through: true, that: true, this: true,
      such: true, including: true, developed: true, built: true, created: true,
      conducted: true, performed: true, implemented: true, designed: true,
      analyzed: true, supported: true, optimized: true, improved: true, collaborated: true,
      led: true, leading: true, work: true, team: true, project: true, role: true,
      responsibilities: true, experience: true, results: true, data: true

  function areKeywordsRedundant(a, b) {
    if (!a || !b) return true;
    if (a.normalized === b.normalized) return true;
    if (a.normalized.indexOf(b.normalized) !== -1 || b.normalized.indexOf(a.normalized) !== -1) return true;
    return false;
  }

  function areKeywordLabelsRedundant(a, b) {

    var right = normalizeKeywordComparable(b);

  }

  function findBestMatchText(text, query) {
    var direct = findTextMatch(text, query);
    if (direct) return text.slice(direct.start, direct.end);

    var words = String(query || "").split(/\s+/).filter(Boolean).sort(function (a, b) {
      return b.length - a.length;
    });
    for (var i = 0; i < words.length; i += 1) {
      if (isWeakKeyword(words[i])) continue;
      var match = findTextMatch(text, words[i]);
      if (match) return text.slice(match.start, match.end);
