<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Profile Preview</title>
  <style>
    :root {
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe3ef;
      --paper: #f8fafc;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .viewer-shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
    }

    .viewer-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
    }

    .viewer-title {
      display: grid;
      gap: 0.15rem;
    }

    .viewer-title h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .viewer-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .viewer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.45rem;
    }

    .viewer-button,
    .viewer-link {
      min-height: 2.25rem;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .viewer-button.is-active {
      border-color: transparent;
      background: var(--accent);
      color: #ffffff;
    }

    .viewer-link {
      color: var(--accent);
    }

    .viewer-frame {
      width: 100%;
      height: calc(100vh - 65px);
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 720px) {
      .viewer-bar {
        align-items: flex-start;
        flex-direction: column;
      }

      .viewer-actions {
        justify-content: flex-start;
      }

      .viewer-frame {
        height: calc(100vh - 122px);
      }
    }
  </style>
</head>
<body>
  <main class="viewer-shell">
    <header class="viewer-bar">
      <div class="viewer-title">
        <h1>Profile Preview</h1>
        <p>Open this file directly. No localhost or deployment needed.</p>
      </div>
      <nav class="viewer-actions" aria-label="Profile actions">
        <button class="viewer-button is-active" type="button" data-profile="ruihang">Ruihang</button>
        <a class="viewer-link" id="open-direct" href="index.html?profile=ruihang&v=local-preview-20260617-ruihang-v7" target="_blank" rel="noreferrer">Open tab</a>
      </nav>
    </header>
    <iframe class="viewer-frame" id="resume-frame" title="Profile preview" src="index.html?profile=ruihang&v=local-preview-20260617-ruihang-v7"></iframe>
  </main>

  <script>
    (function () {
      var frame = document.getElementById("resume-frame");
      var direct = document.getElementById("open-direct");
      var buttons = Array.from(document.querySelectorAll("[data-profile]"));
      var cacheKey = "local-preview-20260617-ruihang-v7";

      function setProfile(profile) {
        var url = "index.html?profile=" + encodeURIComponent(profile) + "&v=" + cacheKey;
        frame.src = url;
        direct.href = url;
        buttons.forEach(function (button) {
          button.classList.toggle("is-active", button.dataset.profile === profile);
        });
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          setProfile(button.dataset.profile);
        });
      });
    })();
  </script>
</body>
</html>
